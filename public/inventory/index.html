<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlatKau — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/inventory/js/layout.js"></script>
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap:.75rem; margin-bottom:1.25rem; }
    @media (max-width:767px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    .stat-card { background:#fff; border:1px solid var(--gray-200); border-radius:12px; padding:.9rem 1rem; }
    .stat-label { font-size:.72rem; color:var(--gray-500); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:.3rem; }
    .stat-val   { font-size:1.25rem; font-weight:700; }
    .stat-sub   { font-size:.72rem; color:var(--gray-400); margin-top:.15rem; }

    .low-stock-badge { display:inline-block; padding:.15rem .5rem; border-radius:99px; font-size:.72rem; font-weight:700; background:#fef9c3; color:#854d0e; }

    .tx-type-badge { display:inline-block; padding:.15rem .5rem; border-radius:6px; font-size:.72rem; font-weight:700; }
    .tx-in         { background:#dcfce7; color:#166534; }
    .tx-out        { background:#fee2e2; color:#991b1b; }
    .tx-borrow     { background:#dbeafe; color:#1e40af; }
    .tx-return     { background:#e0e7ff; color:#3730a3; }
    .tx-transfer   { background:#fef3c7; color:#92400e; }
    .tx-adjustment { background:#f3f4f6; color:#374151; }

    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; flex-wrap:wrap; gap:.5rem; }
    .recent-table { width:100%; border-collapse:collapse; font-size:.83rem; }
    .recent-table th { text-align:left; padding:.4rem .6rem; font-weight:600; color:var(--gray-500); border-bottom:1px solid var(--gray-200); white-space:nowrap; }
    .recent-table td { padding:.4rem .6rem; vertical-align:middle; }
    .recent-table tr:hover { background:var(--gray-50); }
    @media (max-width:767px) {
      .recent-table thead { display:none; }
      .recent-table tbody tr { display:block; border-bottom:1px solid var(--gray-100); padding:.5rem 0; }
      .recent-table tbody td { display:flex; justify-content:space-between; align-items:center; padding:.2rem .5rem; font-size:.82rem; }
      .recent-table tbody td::before { content:attr(data-label); color:var(--gray-500); font-size:.75rem; flex-shrink:0; margin-right:.5rem; }
      .recent-table tbody td[data-label="Lokasi"] { display:none; }
    }
  </style>
</head>
<body data-page="dashboard">
  <div id="navbar-placeholder"></div>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label">Total Barang</div>
          <div class="stat-val" id="sTotalItems">–</div>
          <div class="stat-sub">Master barang</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Low Stock</div>
          <div class="stat-val orange" id="sLowStock">–</div>
          <div class="stat-sub">Di bawah minimum</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Dipinjam</div>
          <div class="stat-val blue" id="sActiveBorrows">–</div>
          <div class="stat-sub">Tools aktif dipinjam</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Transaksi Hari Ini</div>
          <div class="stat-val" id="sTodayTx">–</div>
          <div class="stat-sub">Aktivitas hari ini</div>
        </div>
      </div>

      <!-- Low Stock Alert -->
      <div id="lowStockSection" style="display:none;margin-bottom:1.25rem">
        <div class="section-header">
          <h3 style="font-size:.95rem;font-weight:700">⚠️ Stok Menipis</h3>
          <a href="/inventory/items" class="btn btn-ghost btn-sm">Lihat Semua →</a>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div id="lowStockList"></div>
        </div>
      </div>

      <!-- Recent Transactions -->
      <div id="recentSection">
        <div class="section-header">
          <h3 style="font-size:.95rem;font-weight:700">📋 Transaksi Terbaru</h3>
          <a href="/inventory/transactions" class="btn btn-ghost btn-sm">Lihat Semua →</a>
        </div>
        <div class="card" style="padding:0">
          <div id="recentBody" style="text-align:center;padding:2rem;color:var(--gray-400)">🔄 Memuat...</div>
        </div>
      </div>

    </main>
  </div>
  <div id="bottom-nav-placeholder"></div>

  <script>
    const fmt     = new Intl.NumberFormat('id-ID');
    const fmtDt   = d => new Date(d).toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    const TX_TYPE = { in:'Masuk', out:'Keluar', borrow:'Pinjam', return:'Return', transfer:'Transfer', adjustment:'Koreksi' };

    window.onLayoutReady = async () => {
      const data = await fetch('/api/inventory/dashboard').then(r => r.json()).catch(() => null);
      if (!data) return;

      const s = data.stats;
      document.getElementById('sTotalItems').textContent    = fmt.format(s.totalItems);
      document.getElementById('sLowStock').textContent      = s.lowStock;
      document.getElementById('sActiveBorrows').textContent = s.activeBorrows;
      document.getElementById('sTodayTx').textContent       = s.todayTx;

      // Low stock
      if (data.lowStockItems.length) {
        document.getElementById('lowStockSection').style.display = '';
        document.getElementById('lowStockList').innerHTML = data.lowStockItems.map(i => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--gray-100)">
            <div>
              <div style="font-weight:600;font-size:.88rem">${i.name} <span style="font-size:.75rem;color:var(--gray-400)">${i.code}</span></div>
              <div style="font-size:.75rem;color:var(--gray-500)">Stok: ${fmt.format(i.total_qty)} ${i.unit} · Min: ${fmt.format(i.min_stock)}</div>
            </div>
            <span class="low-stock-badge">⚠️ Low</span>
          </div>`).join('');
      }

      // Recent transactions
      if (!data.recentTx.length) {
        document.getElementById('recentBody').textContent = 'Belum ada transaksi';
        return;
      }
      document.getElementById('recentBody').innerHTML = `
        <table class="recent-table">
          <thead><tr>
            <th>Waktu</th><th>Tipe</th><th>Barang</th><th>Lokasi</th><th>Qty</th><th>Oleh</th>
          </tr></thead>
          <tbody>${data.recentTx.map(t => `
            <tr>
              <td data-label="Waktu">${fmtDt(t.created_at)}</td>
              <td data-label="Tipe"><span class="tx-type-badge tx-${t.type}">${TX_TYPE[t.type]||t.type}</span></td>
              <td data-label="Barang"><span style="font-weight:600">${t.item_name}</span><br><span style="font-size:.72rem;color:var(--gray-400)">${t.item_code}</span></td>
              <td data-label="Lokasi">${t.location_name||'–'} / ${t.rack_name||'–'}</td>
              <td data-label="Qty" style="font-weight:700">${t.qty > 0 ? '+' : ''}${fmt.format(t.qty)} ${t.unit}</td>
              <td data-label="Oleh" style="color:var(--gray-500)">${t.created_by_name||'–'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    };
  </script>
</body>
</html>
