<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlatKau — Lokasi &amp; Rak</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/inventory/js/layout.js"></script>
  <style>
    .loc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }

    .loc-card { background:#fff; border:1px solid var(--gray-200); border-radius:12px; overflow:hidden; }
    .loc-card-header { padding:.85rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:.5rem; border-bottom:1px solid var(--gray-100); }
    .loc-card-body { padding:.75rem 1rem; }
    .loc-type-icon { font-size:1.4rem; flex-shrink:0; }
    .loc-info { flex:1; min-width:0; }
    .loc-name { font-weight:700; font-size:.95rem; }
    .loc-type-badge { display:inline-block; font-size:.68rem; font-weight:700; padding:.1rem .4rem; border-radius:4px; margin-top:.2rem; }
    .lt-warehouse { background:#dbeafe; color:#1e40af; }
    .lt-vehicle   { background:#dcfce7; color:#166534; }
    .lt-workbench { background:#fef9c3; color:#854d0e; }
    .lt-area      { background:#f3f4f6; color:#374151; }

    .rack-item { display:flex; align-items:center; justify-content:space-between; padding:.55rem .65rem; border-radius:9px; background:var(--gray-50); margin-bottom:.4rem; font-size:.84rem; }
    .rack-name { font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rack-actions { display:flex; gap:.3rem; flex-shrink:0; }
    .rack-actions .btn { min-width:34px; min-height:34px; display:flex; align-items:center; justify-content:center; }

    @media (max-width:600px) {
      .loc-grid { grid-template-columns:1fr; }
      .loc-card-header { padding:.75rem .85rem; }
      .loc-card-body { padding:.65rem .85rem; }
    }

    .qr-placeholder { padding:.75rem; border:1.5px dashed var(--gray-200); border-radius:8px; text-align:center; color:var(--gray-400); font-size:.8rem; cursor:pointer; margin-top:.5rem; }
    .qr-code-text { font-family:monospace; font-size:.85rem; background:var(--gray-100); padding:.3rem .6rem; border-radius:5px; }

    /* QR Modal */
    .qr-modal-inner { text-align:center; }
    .qr-sticker {
      display:inline-flex; align-items:center; gap:1rem;
      background:#fff; border:2px solid #1e293b;
      border-radius:14px; padding:.9rem 1.1rem; margin-bottom:.85rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.1); text-align:left;
    }
    .qr-sticker canvas, .qr-sticker img { display:block; border-radius:6px; flex-shrink:0; }
    .qr-sticker-info { display:flex; flex-direction:column; justify-content:center; }
    .qr-brand-row {
      display:flex; align-items:center; gap:.3rem; margin-bottom:.5rem;
    }
    .qr-brand-name { font-size:.75rem; font-weight:800; color:#1e293b; letter-spacing:.02em; }
    .qr-brand-name span { color:#f97316; }
    .qr-sticker-rack { font-weight:800; font-size:1rem; color:#1e293b; line-height:1.2; }
    .qr-sticker-id   { font-size:.65rem; color:#94a3b8; margin-top:.15rem; font-family:monospace; letter-spacing:.04em; }
    .qr-sticker-loc  { font-size:.72rem; color:#64748b; margin-top:.2rem; }
    .qr-sticker-hint { font-size:.6rem; color:#94a3b8; margin-top:.5rem; letter-spacing:.04em; text-transform:uppercase; }
    .qr-url { font-size:.7rem; color:var(--gray-400); word-break:break-all; margin-bottom:.65rem; }
  </style>
</head>
<body data-page="locations">
  <div id="navbar-placeholder"></div>
  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
        <h2 style="font-size:1rem;font-weight:700">📍 Lokasi & Rak</h2>
        <button class="btn btn-primary btn-sm" id="btnNewLoc">+ Tambah Lokasi</button>
      </div>

      <div id="pageAlert" class="alert alert-error"></div>
      <div id="pageSuccess" class="alert alert-success"></div>

      <div class="loc-grid" id="locGrid">
        <div style="text-align:center;padding:2rem;color:var(--gray-400)">🔄 Memuat...</div>
      </div>

    </main>
  </div>
  <div id="bottom-nav-placeholder"></div>

  <!-- Modal: Lokasi -->
  <div class="modal-overlay" id="locModal">
    <div class="modal">
      <div class="modal-header"><span class="modal-title" id="locModalTitle">Tambah Lokasi</span></div>
      <div class="modal-body">
        <div id="locAlert" class="alert alert-error"></div>
        <div class="form-group">
          <label>Nama Lokasi <span style="color:var(--red)">*</span></label>
          <input type="text" id="lName" placeholder="mis. Gudang Utama, Mobil Andi..." />
        </div>
        <div class="form-group">
          <label>Tipe <span style="color:var(--red)">*</span></label>
          <select id="lType">
            <option value="warehouse">🏭 Gudang</option>
            <option value="vehicle">🚗 Mobil Teknisi</option>
            <option value="workbench">🪑 Meja Kerja</option>
            <option value="area">🏗️ Area Workshop</option>
          </select>
        </div>
        <div class="form-group">
          <label>Kode QR <span style="color:var(--gray-400);font-size:.78rem">(opsional)</span></label>
          <input type="text" id="lQR" placeholder="mis. LOC-GDG-01" />
          <div style="font-size:.75rem;color:var(--gray-400);margin-top:.25rem">Kode ini ditempel di lokasi fisik untuk memudahkan input</div>
        </div>
        <div class="form-group">
          <label>Catatan</label>
          <textarea id="lNotes" rows="2" style="resize:vertical"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="locCancel">Batal</button>
        <button class="btn btn-primary" id="locSave">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal: Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">🗑️ Hapus</span>
        <button class="modal-close" id="deleteModalClose">✕</button>
      </div>
      <div class="modal-body">
        <p id="deleteModalMsg" style="font-size:.9rem"></p>
        <p class="text-muted mt-1" style="font-size:.82rem" id="deleteModalSub"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="deleteModalCancel">Batal</button>
        <button class="btn btn-danger" id="deleteModalConfirm">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Modal: QR Pinjam -->
  <div class="modal-overlay" id="qrModal">
    <div class="modal" style="max-width:340px">
      <div class="modal-header">
        <span class="modal-title">📱 QR Pinjam Alat</span>
        <button class="modal-close" id="qrModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="qr-modal-inner">
          <div class="qr-sticker">
            <div id="qrCanvas"></div>
            <div class="qr-sticker-info">
              <div class="qr-brand-row">
                <span style="font-size:.8rem">🔧</span>
                <div class="qr-brand-name"><span>Alat</span>Kau</div>
              </div>
              <div class="qr-sticker-rack" id="qrRackLabel"></div>
              <div class="qr-sticker-id"  id="qrRackId"></div>
              <div class="qr-sticker-loc" id="qrLocLabel"></div>
              <div class="qr-sticker-hint">Scan untuk pinjam alat</div>
            </div>
          </div>
          <div class="qr-url" id="qrUrl"></div>
          <p style="font-size:.75rem;color:var(--gray-400)">
            Tempel sticker ini di rak. Karyawan scan → langsung ke halaman pinjam.
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="qrModalClose2">Tutup</button>
        <button class="btn btn-primary" id="qrPrintBtn">🖨️ Print</button>
      </div>
    </div>
  </div>

  <!-- Modal: Rak -->
  <div class="modal-overlay" id="rackModal">
    <div class="modal">
      <div class="modal-header"><span class="modal-title" id="rackModalTitle">Tambah Rak</span></div>
      <div class="modal-body">
        <div id="rackAlert" class="alert alert-error"></div>
        <div id="rackLocName" style="font-weight:700;margin-bottom:.75rem;font-size:.9rem"></div>
        <div class="form-group">
          <label>Nama Rak <span style="color:var(--red)">*</span></label>
          <input type="text" id="rName" placeholder="mis. A1-01, BOX-01, RAK-KIRI..." />
        </div>
        <div class="form-group">
          <label>Catatan</label>
          <input type="text" id="rNotes" placeholder="Opsional" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="rackCancel">Batal</button>
        <button class="btn btn-primary" id="rackSave">Simpan</button>
      </div>
    </div>
  </div>

  <script>
    const TYPE_ICON  = { warehouse:'🏭', vehicle:'🚗', workbench:'🪑', area:'🏗️' };
    const TYPE_LABEL = { warehouse:'Gudang', vehicle:'Mobil', workbench:'Meja Kerja', area:'Area' };

    let _locs  = [];
    let _racks = {};   // { location_id: [racks] }
    let _editLocId  = null;
    let _editRackId = null;
    let _curLocId   = null;

    window.onLayoutReady = async () => { await loadAll(); };

    async function loadAll() {
      const [locs, racks] = await Promise.all([
        fetch('/api/inventory/locations').then(r => r.json()).catch(() => []),
        fetch('/api/inventory/racks').then(r => r.json()).catch(() => []),
      ]);
      _locs = locs;
      _racks = {};
      for (const r of racks) {
        if (!_racks[r.location_id]) _racks[r.location_id] = [];
        _racks[r.location_id].push(r);
      }
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('locGrid');
      if (!_locs.length) {
        grid.innerHTML = '<div class="card" style="text-align:center;padding:2rem;color:var(--gray-400)">Belum ada lokasi. Tambah lokasi pertama!</div>';
        return;
      }
      grid.innerHTML = _locs.map(loc => {
        const racks = _racks[loc.id] || [];
        return `
          <div class="loc-card">
            <div class="loc-card-header">
              <span class="loc-type-icon">${TYPE_ICON[loc.type]||'📍'}</span>
              <div class="loc-info">
                <div class="loc-name">${loc.name}</div>
                <span class="loc-type-badge lt-${loc.type}">${TYPE_LABEL[loc.type]||loc.type}</span>
                ${loc.qr_code ? `<span class="qr-code-text" style="margin-left:.35rem;font-size:.68rem">QR: ${loc.qr_code}</span>` : ''}
              </div>
              <div style="display:flex;gap:.25rem;flex-shrink:0">
                <button class="btn btn-ghost btn-sm" onclick="openEditLoc(${loc.id})">✏️</button>
                <button class="btn btn-ghost btn-sm text-red" onclick="deleteLoc(${loc.id},'${loc.name.replace(/'/g,"\\'")}')">🗑️</button>
              </div>
            </div>
            <div class="loc-card-body">
              ${racks.length
                ? racks.map(r => `
                  <div class="rack-item">
                    <span class="rack-name">🗄️ ${r.name}</span>
                    <div class="rack-actions">
                      <button class="btn btn-ghost btn-sm" title="QR Pinjam" onclick="showQR(${r.id},'${r.name.replace(/'/g,"\\'")}','${loc.name.replace(/'/g,"\\'")}')">📱</button>
                      <button class="btn btn-ghost btn-sm" onclick="openEditRack(${r.id},${loc.id},'${loc.name.replace(/'/g,"\\'")}')">✏️</button>
                      <button class="btn btn-ghost btn-sm text-red" onclick="deleteRack(${r.id},'${r.name.replace(/'/g,"\\'")}')">🗑️</button>
                    </div>
                  </div>`).join('')
                : '<div style="font-size:.8rem;color:var(--gray-400);padding:.25rem 0">Belum ada rak</div>'}
              <button class="btn btn-ghost btn-sm" style="margin-top:.5rem;width:100%" onclick="openNewRack(${loc.id},'${loc.name.replace(/'/g,"\\'")}')">+ Tambah Rak</button>
            </div>
          </div>`;
      }).join('');
    }

    // ── Lokasi CRUD ──────────────────────────────────────────
    document.getElementById('btnNewLoc').addEventListener('click', () => openLocModal());
    document.getElementById('locCancel').addEventListener('click', () => closeModal('locModal'));
    document.getElementById('locSave').addEventListener('click', saveLoc);

    function openLocModal(loc) {
      _editLocId = loc?.id || null;
      document.getElementById('locModalTitle').textContent = loc ? 'Edit Lokasi' : 'Tambah Lokasi';
      document.getElementById('lName').value  = loc?.name || '';
      document.getElementById('lType').value  = loc?.type || 'warehouse';
      document.getElementById('lQR').value    = loc?.qr_code || '';
      document.getElementById('lNotes').value = loc?.notes || '';
      hideAlert('locAlert');
      document.getElementById('locModal').classList.add('open');
    }

    function openEditLoc(id) { openLocModal(_locs.find(l => l.id === id)); }

    async function saveLoc() {
      const body = {
        name:    document.getElementById('lName').value.trim(),
        type:    document.getElementById('lType').value,
        qr_code: document.getElementById('lQR').value.trim(),
        notes:   document.getElementById('lNotes').value.trim(),
      };
      if (!body.name) return showAlert('locAlert', 'Nama lokasi wajib diisi');
      const url    = _editLocId ? `/api/inventory/locations/${_editLocId}` : '/api/inventory/locations';
      const method = _editLocId ? 'PUT' : 'POST';
      const res  = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) return showAlert('locAlert', data.error);
      closeModal('locModal');
      showSuccess('pageSuccess', `Lokasi "${data.name}" berhasil disimpan`);
      await loadAll();
    }

    async function deleteLoc(id, name) {
      const ok = await confirmDelete(
        `Hapus lokasi "${name}"?`,
        'Semua rak di lokasi ini harus sudah kosong.'
      );
      if (!ok) return;
      const res = await fetch(`/api/inventory/locations/${id}`, { method:'DELETE' });
      const data = await res.json();
      if (!res.ok) { showAlert('pageAlert', data.error); return; }
      showSuccess('pageSuccess', `Lokasi "${name}" dihapus`);
      await loadAll();
    }

    // ── Rak CRUD ─────────────────────────────────────────────
    document.getElementById('rackCancel').addEventListener('click', () => closeModal('rackModal'));
    document.getElementById('rackSave').addEventListener('click', saveRack);

    function openNewRack(locId, locName) {
      _editRackId = null; _curLocId = locId;
      document.getElementById('rackModalTitle').textContent = 'Tambah Rak';
      document.getElementById('rackLocName').textContent = `📍 ${locName}`;
      document.getElementById('rName').value  = '';
      document.getElementById('rNotes').value = '';
      hideAlert('rackAlert');
      document.getElementById('rackModal').classList.add('open');
    }

    function openEditRack(rackId, locId, locName) {
      const allRacks = Object.values(_racks).flat();
      const rack = allRacks.find(r => r.id === rackId);
      _editRackId = rackId; _curLocId = locId;
      document.getElementById('rackModalTitle').textContent = 'Edit Rak';
      document.getElementById('rackLocName').textContent = `📍 ${locName}`;
      document.getElementById('rName').value  = rack?.name || '';
      document.getElementById('rNotes').value = rack?.notes || '';
      hideAlert('rackAlert');
      document.getElementById('rackModal').classList.add('open');
    }

    async function saveRack() {
      const body = {
        location_id: _curLocId,
        name:  document.getElementById('rName').value.trim(),
        notes: document.getElementById('rNotes').value.trim(),
      };
      if (!body.name) return showAlert('rackAlert', 'Nama rak wajib diisi');
      const url    = _editRackId ? `/api/inventory/racks/${_editRackId}` : '/api/inventory/racks';
      const method = _editRackId ? 'PUT' : 'POST';
      const res  = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) return showAlert('rackAlert', data.error);
      closeModal('rackModal');
      showSuccess('pageSuccess', `Rak "${data.name}" berhasil disimpan`);
      await loadAll();
      // Auto-show QR for new racks so user can print the sticker right away
      if (!_editRackId) {
        const loc = _locs.find(l => l.id === _curLocId);
        showQR(data.id, data.name, loc?.name || '');
      }
    }

    async function deleteRack(id, name) {
      const ok = await confirmDelete(`Hapus rak "${name}"?`, 'Tidak bisa dihapus jika masih ada stok.');
      if (!ok) return;
      const res = await fetch(`/api/inventory/racks/${id}`, { method:'DELETE' });
      const data = await res.json();
      if (!res.ok) { showAlert('pageAlert', data.error); return; }
      showSuccess('pageSuccess', `Rak "${name}" dihapus`);
      await loadAll();
    }

    // ── QR Code ───────────────────────────────────────────────
    let _qrRackId = null;

    function showQR(rackId, rackName, locName) {
      _qrRackId = rackId;
      const url = `${location.origin}/inventory/pinjam?rack=${rackId}`;
      document.getElementById('qrRackLabel').textContent = `🗄️ ${rackName}`;
      document.getElementById('qrRackId').textContent    = `ID: ${rackId}`;
      document.getElementById('qrLocLabel').textContent  = `📍 ${locName}`;
      document.getElementById('qrUrl').textContent       = url;

      const container = document.getElementById('qrCanvas');
      container.innerHTML = '';
      new QRCode(container, {
        text: url, width: 140, height: 140,
        colorDark: '#1e293b', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });
      document.getElementById('qrModal').classList.add('open');
    }

    document.getElementById('qrModalClose').addEventListener('click',  () => closeModal('qrModal'));
    document.getElementById('qrModalClose2').addEventListener('click', () => closeModal('qrModal'));
    document.getElementById('qrModal').addEventListener('click', e => { if (e.target.id === 'qrModal') closeModal('qrModal'); });

    document.getElementById('qrPrintBtn').addEventListener('click', () => {
      const container = document.getElementById('qrCanvas');
      const rack    = document.getElementById('qrRackLabel').textContent;
      const loc     = document.getElementById('qrLocLabel').textContent;
      const cvs     = container.querySelector('canvas');
      const imgData = cvs ? cvs.toDataURL('image/png') : '';
      const win = window.open('', '_blank', 'width=420,height=580');
      win.document.write(`<!DOCTYPE html><html><head><title>QR ${rack}</title>
        <style>
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#f8fafc;display:flex;align-items:center;justify-content:center;
            min-height:100vh;padding:1.5rem}
          .sticker{background:#fff;border:2.5px solid #1e293b;border-radius:14px;
            padding:.9rem 1.1rem;display:inline-flex;align-items:center;gap:.85rem;
            box-shadow:0 4px 20px rgba(0,0,0,.12)}
          .qr-img{display:block;border-radius:6px;width:110px;height:110px;flex-shrink:0}
          .info{display:flex;flex-direction:column;justify-content:center}
          .brand{display:flex;align-items:center;gap:.3rem;margin-bottom:.45rem}
          .brand-name{font-size:.75rem;font-weight:800;color:#1e293b}
          .brand-name span{color:#f97316}
          .rack-name{font-weight:800;font-size:1rem;color:#1e293b;line-height:1.2}
          .rack-id{font-size:.65rem;color:#94a3b8;margin-top:.15rem;font-family:monospace;letter-spacing:.04em}
          .loc-name{font-size:.7rem;color:#64748b;margin-top:.2rem}
          .hint{font-size:.58rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-top:.45rem}
          .no-print{margin-top:1.5rem;text-align:center}
          .btn-print{padding:.55rem 1.5rem;background:#f97316;color:#fff;border:none;
            border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit}
          @media print{.no-print{display:none}body{background:#fff}
            .sticker{box-shadow:none;border-color:#000}}
        </style></head><body>
        <div>
          <div class="sticker">
            <img class="qr-img" src="${imgData}" />
            <div class="info">
              <div class="brand"><span>🔧</span>
                <div class="brand-name"><span>Alat</span>Kau</div>
              </div>
              <div class="rack-name">${rack}</div>
              <div class="rack-id">ID: ${_qrRackId}</div>
              <div class="loc-name">${loc}</div>
              <div class="hint">Scan untuk pinjam alat</div>
            </div>
          </div>
          <div class="no-print">
            <button class="btn-print" onclick="window.print()">🖨️ Print Sticker</button>
          </div>
        </div>
        <script>window.onload=()=>window.print()<\/script>
      </body></html>`);
      win.document.close();
    });

    // ── Helpers ──────────────────────────────────────────────
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function showAlert(id, msg)   { const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
    function hideAlert(id)        { document.getElementById(id)?.classList.remove('show'); }
    function showSuccess(id, msg) {
      const el=document.getElementById(id); el.textContent=msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function confirmDelete(msg, sub = '') {
      return new Promise(resolve => {
        document.getElementById('deleteModalMsg').textContent = msg;
        document.getElementById('deleteModalSub').textContent = sub;
        document.getElementById('deleteModal').classList.add('open');
        const confirm = document.getElementById('deleteModalConfirm');
        const cancel  = document.getElementById('deleteModalCancel');
        const close   = document.getElementById('deleteModalClose');
        const cleanup = (val) => {
          closeModal('deleteModal');
          confirm.replaceWith(confirm.cloneNode(true));
          cancel.replaceWith(cancel.cloneNode(true));
          close.replaceWith(close.cloneNode(true));
          resolve(val);
        };
        document.getElementById('deleteModalConfirm').addEventListener('click', () => cleanup(true),  { once: true });
        document.getElementById('deleteModalCancel').addEventListener('click',  () => cleanup(false), { once: true });
        document.getElementById('deleteModalClose').addEventListener('click',   () => cleanup(false), { once: true });
      });
    }
  </script>
</body>
</html>
