<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="/assets/logo/logo-CSK.png" alt="Logo" style="height:64px;width:auto;margin-bottom:.5rem" />
        <h3>DuitKau</h3>
        <p>Sistem Laporan Keuangan Perusahaan</p>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username"
            required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Masukkan password"
            autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full mt-1" id="submitBtn">
          Masuk
        </button>
      </form>


    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(msg) {
      alertEl.textContent = msg;
      alertEl.classList.add('show');
    }

    function hideAlert() {
      alertEl.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Login gagal');
          return;
        }

        if (data.role === 'finance' || data.role === 'super_admin') {
          window.location.href = '/finance.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch {
        showAlert('Terjadi kesalahan. Coba lagi.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>

</html>
