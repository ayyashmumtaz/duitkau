<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
    }

    /* ── Left panel — background image ── */
    .login-panel-bg {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: none;
    }

    @media (min-width: 768px) {
      .login-panel-bg {
        display: block;
      }
    }

    .login-panel-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* gradient overlay so text is legible */
    .login-panel-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
          rgba(15, 23, 42, .55) 0%,
          rgba(15, 23, 42, .2) 50%,
          rgba(15, 23, 42, .65) 100%);
    }

    .login-panel-bg-content {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2.5rem;
    }

    .login-panel-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      position: absolute;
      top: 2rem;
      left: 2.5rem;
    }

    .login-panel-brand img {
      height: 36px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .4));
    }

    .login-panel-brand-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .5);
      letter-spacing: .01em;
    }

    .login-panel-brand-name span {
      color: #fb923c;
    }

    .login-panel-caption {
      color: rgba(255, 255, 255, .92);
      text-shadow: 0 1px 6px rgba(0, 0, 0, .5);
    }

    .login-panel-caption h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .4rem;
      line-height: 1.3;
    }

    .login-panel-caption p {
      font-size: .85rem;
      color: rgba(255, 255, 255, .7);
      line-height: 1.6;
    }

    /* ── Right panel — form ── */
    .login-panel-form {
      width: 100%;
      max-width: 440px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem;
      position: relative;
      overflow-y: auto;
    }

    /* mobile: full screen with bg behind */
    @media (max-width: 767px) {
      body {
        background: url('/assets/background/background.png') center/cover no-repeat;
      }

      .login-panel-form {
        max-width: 100%;
        min-height: 100vh;
        background: rgba(255, 255, 255, .97);
      }
    }

    .form-header {
      margin-bottom: 2rem;
    }

    .form-header-brand {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1.75rem;
    }

    .form-header-brand img {
      height: 32px;
      width: auto;
    }

    .form-header-brand-text {
      font-size: .8rem;
      font-weight: 700;
      color: #64748b;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .form-header-brand-text span {
      color: #f97316;
    }

    .form-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: .4rem;
    }

    .form-header p {
      font-size: .875rem;
      color: #64748b;
    }

    .form-divider {
      height: 1px;
      background: #e2e8f0;
      margin: 1.75rem 0;
    }

    /* form fields */
    .field {
      margin-bottom: 1.1rem;
    }

    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .4rem;
      letter-spacing: .01em;
    }

    .field input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .9rem;
      color: #111827;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: #f9fafb;
    }

    .field input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, .12);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .15s, transform .1s;
      letter-spacing: .02em;
    }

    .btn-login:hover:not(:disabled) {
      opacity: .92;
      transform: translateY(-1px);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: .65rem .9rem;
      font-size: .85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error.show {
      display: block;
    }

    .form-footer {
      margin-top: 2rem;
      font-size: .75rem;
      color: #94a3b8;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>

<body>

  <!-- Left: background panel -->
  <div class="login-panel-bg">
    <img src="/assets/background/background.png" alt="Background" />
    <div class="login-panel-bg-content">
      <div class="login-panel-brand">
        <img src="/assets/logo/logo-CSK.png" alt="Cakra" />
        <div class="login-panel-brand-name"><span>Cakra</span> ERP</div>
      </div>
      <div class="login-panel-caption">
        <h2>Kelola keuangan<br>lebih mudah.</h2>
        <p>Platform terintegrasi untuk reimburse,<br>cash advance, dan laporan keuangan.</p>
      </div>
    </div>
  </div>

  <!-- Right: form panel -->
  <div class="login-panel-form">
    <div class="form-header">
      <div class="form-header-brand">
        <img src="/assets/logo/logo-CSK.png" alt="Cakra" />
        <div class="form-header-brand-text"><span>Cakra</span> ERP</div>
      </div>
      <h1>Selamat Datang</h1>
      <p>Masuk ke akun kamu untuk melanjutkan</p>
    </div>

    <div id="alertEl" class="alert-error"></div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" autocomplete="username"
          required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password"
          autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="submitBtn">Masuk</button>
    </form>

    <div class="form-divider"></div>

    <div class="form-footer">
      &copy; 2025 PT. Cakra Sinergi Kreatif<br>
      Maritime Technology Unit
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alertEl');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          alertEl.textContent = data.error || 'Login gagal';
          alertEl.classList.add('show');
          return;
        }
        window.location.href = '/apps.html';
      } catch {
        alertEl.textContent = 'Terjadi kesalahan. Coba lagi.';
        alertEl.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>

</html>
