<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Laporan Karyawan</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/layout.js"></script>
  <script src="/js/utils.js"></script>
</head>
<body data-page="reports">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <!-- Main -->
    <main class="main-content">
      <!-- Print header (hidden on screen) -->
      <div class="print-header">
        <img src="/assets/logo/logo-CSK.png" alt="Logo" />
        <h2>Laporan Keuangan Karyawan</h2>
        <p id="printMeta"></p>
      </div>

      <div class="flex items-center justify-between" style="margin-bottom:1rem; flex-wrap:wrap; gap:.5rem">
        <h1 class="page-title" style="margin-bottom:0">Laporan Karyawan</h1>
        <div style="display:flex; gap:.5rem">
          <button class="btn btn-ghost btn-sm" id="btnPrint" style="display:none">Download PDF</button>
          <button class="btn btn-ghost btn-sm" id="btnShare" style="display:none">Bagikan Link</button>
        </div>
      </div>

      <!-- Filter Panel -->
      <div class="card no-print" style="margin-bottom:1.25rem">
        <div class="card-title">🔍 Filter Laporan</div>
        <div class="report-filter-grid" style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; gap:.85rem; align-items:end">

          <div class="form-group" style="margin-bottom:0">
            <label>Karyawan</label>
            <select id="filterEmployee">
              <option value="all">Semua Karyawan</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label>Tipe Periode</label>
            <select id="periodType">
              <option value="month">Per Bulan</option>
              <option value="year">Per Tahun</option>
              <option value="date">Tanggal Tertentu</option>
              <option value="all">Semua Waktu</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0" id="periodValueGroup">
            <label id="periodValueLabel">Pilih Bulan</label>
            <input type="month" id="periodValue" />
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label>Proyek</label>
            <select id="filterProject">
              <option value="">Semua Proyek</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label>Kategori</label>
            <select id="filterCategory">
              <option value="">Semua Kategori</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0">
            <label>Cash Advance</label>
            <select id="filterCa">
              <option value="">Semua CA</option>
            </select>
          </div>

          <div class="btn-search" style="padding-bottom:0">
            <button class="btn btn-primary" id="btnSearch" style="width:100%; white-space:nowrap">
              Cari
            </button>
          </div>
        </div>
      </div>

      <div id="mainAlert" class="alert alert-error"></div>

      <!-- Summary Cards -->
      <div class="summary-grid" id="summaryCards" style="display:none; grid-template-columns:repeat(4,1fr)">
        <div class="summary-card masuk">
          <div class="summary-label">Total Pemasukan</div>
          <div class="summary-value green" id="resMasuk">Rp 0</div>
        </div>
        <div class="summary-card keluar">
          <div class="summary-label">Total Pengeluaran</div>
          <div class="summary-value red" id="resKeluar">Rp 0</div>
        </div>
        <div class="summary-card net-positive">
          <div class="summary-label">Total Sisa Dana</div>
          <div class="summary-value blue" id="resSisa">Rp 0</div>
        </div>
        <div class="summary-card net-negative">
          <div class="summary-label">Total Klaim</div>
          <div class="summary-value orange" id="resKlaim">Rp 0</div>
        </div>
      </div>

      <!-- Results -->
      <div id="resultsArea"></div>
    </main>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Bukti transaksi" />
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay" id="shareOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Link Laporan</span>
        <button class="modal-close" id="shareClose">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:.85rem; color:var(--gray-600); margin-bottom:.75rem">Link ini bisa dibuka siapapun tanpa login. Salin dan kirim via WhatsApp / SMS.</p>
        <div style="display:flex; gap:.5rem">
          <input type="text" id="shareUrl" readonly style="flex:1; font-size:.8rem" />
          <button class="btn btn-primary btn-sm" id="copyUrl">Salin</button>
        </div>
        <div style="margin-top:.75rem; display:flex; gap:.5rem; flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="waShare">WhatsApp</button>
          <button class="btn btn-ghost btn-sm" id="smsShare">SMS</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modals-placeholder"></div>

  <script>
    const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
    const fmtDate = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

    window.onLayoutReady = async function(user) {
      await Promise.all([loadEmployees(), loadProjects(), loadCategories(), loadCAs()]);
      updatePeriodInput();

      // Set default period to current month
      const now = new Date();
      const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('periodValue').value = ym;
    };

    async function loadEmployees() {
      try {
        const res = await fetch('/api/employees');
        const data = await res.json();
        const sel = document.getElementById('filterEmployee');
        data.forEach(emp => {
          const opt = document.createElement('option');
          opt.value = emp.id;
          opt.textContent = emp.full_name + ' (@' + emp.username + ')';
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects').then(r => r.json());
        const sel = document.getElementById('filterProject');
        res.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories').then(r => r.json());
        const sel = document.getElementById('filterCategory');
        res.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadCAs() {
      try {
        const res = await fetch('/api/ca').then(r => r.json());
        const sel = document.getElementById('filterCa');
        res.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = `[${c.status.toUpperCase()}] ${c.title}`;
          sel.appendChild(opt);
        });
      } catch {}
    }

    // ─── Period type change ──────────────────
    document.getElementById('periodType').addEventListener('change', updatePeriodInput);

    function updatePeriodInput() {
      const type = document.getElementById('periodType').value;
      const group = document.getElementById('periodValueGroup');
      const label = document.getElementById('periodValueLabel');
      const input = document.getElementById('periodValue');

      if (type === 'all') {
        group.style.visibility = 'hidden';
        return;
      }

      group.style.visibility = 'visible';

      if (type === 'month') {
        label.textContent = 'Pilih Bulan';
        input.type = 'month';
        input.placeholder = '';
      } else if (type === 'year') {
        label.textContent = 'Pilih Tahun';
        input.type = 'number';
        input.min = '2000';
        input.max = '2100';
        input.step = '1';
        input.placeholder = 'Contoh: 2024';
        input.value = new Date().getFullYear();
      } else if (type === 'date') {
        label.textContent = 'Pilih Tanggal';
        input.type = 'date';
        input.placeholder = '';
        input.value = new Date().toISOString().slice(0, 10);
      }
    }

    // ─── Search ──────────────────────────────
    document.getElementById('btnSearch').addEventListener('click', search);

    async function search() {
      hideAlert('mainAlert');
      const employeeId = document.getElementById('filterEmployee').value;
      const periodType = document.getElementById('periodType').value;
      const periodValue = document.getElementById('periodValue').value;
      const projectId = document.getElementById('filterProject').value;

      if (periodType !== 'all' && !periodValue) {
        showAlert('mainAlert', 'Pilih periode terlebih dahulu');
        return;
      }

      const categoryId = document.getElementById('filterCategory').value;
      const caId = document.getElementById('filterCa').value;
      
      const params = new URLSearchParams({ userId: employeeId, periodType });
      if (periodType !== 'all') params.append('periodValue', periodValue);
      if (projectId) params.append('projectId', projectId);
      if (categoryId) params.append('categoryId', categoryId);
      if (caId) params.append('caId', caId);

      const btn = document.getElementById('btnSearch');
      btn.disabled = true;
      btn.textContent = 'Mencari...';

      try {
        const res = await fetch('/api/finance/report?' + params.toString());
        if (!res.ok) throw new Error();
        const data = await res.json();
        renderResults(data);
      } catch {
        showAlert('mainAlert', 'Gagal mengambil data laporan');
        document.getElementById('summaryCards').style.display = 'none';
        document.getElementById('resultsArea').innerHTML = '';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cari';
      }
    }

    function renderResults(data) {
      const summaryEl = document.getElementById('summaryCards');
      document.getElementById('btnPrint').style.display = 'none';
      document.getElementById('btnShare').style.display = 'none';

      if (data.length === 0) {
        summaryEl.style.display = 'none';
        document.getElementById('resultsArea').innerHTML = `
          <div class="card">
            <div class="empty"><div class="empty-icon">📭</div>Tidak ada transaksi ditemukan</div>
          </div>`;
        return;
      }

      // Summary
      const totMasuk = data.reduce((s, e) => s + e.totalMasuk, 0);
      const totKeluar = data.reduce((s, e) => s + e.totalKeluar, 0);
      const totSisa = data.reduce((s, e) => s + (e.net > 0 ? e.net : 0), 0);
      const totKlaim = data.reduce((s, e) => s + (e.net < 0 ? Math.abs(e.net) : 0), 0);

      document.getElementById('resMasuk').textContent = fmt.format(totMasuk);
      document.getElementById('resKeluar').textContent = fmt.format(totKeluar);
      document.getElementById('resSisa').textContent = fmt.format(totSisa);
      document.getElementById('resKlaim').textContent = fmt.format(totKlaim);
      summaryEl.style.display = 'grid';

      // Show print/share buttons and set meta
      const empLabel = document.getElementById('filterEmployee').options[document.getElementById('filterEmployee').selectedIndex].text;
      const periodType = document.getElementById('periodType').value;
      const periodValue = document.getElementById('periodValue').value;
      const periodLabel = periodType === 'all' ? 'Semua Waktu' : periodValue;
      document.getElementById('printMeta').textContent = `Karyawan: ${empLabel} | Periode: ${periodLabel} | Dicetak: ${new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' })}`;
      document.getElementById('btnPrint').style.display = '';
      document.getElementById('btnShare').style.display = '';

      // Per-employee accordion
      document.getElementById('resultsArea').innerHTML = data.map(emp => {
        const txUmum = emp.transactions.filter(tx => !tx.ca_id);
        const txCA   = emp.transactions.filter(tx =>  tx.ca_id);

        // Group CA transactions by ca_id
        const caGroups = {};
        txCA.forEach(tx => {
          if (!caGroups[tx.ca_id]) caGroups[tx.ca_id] = { title: tx.ca_title, txs: [] };
          caGroups[tx.ca_id].txs.push(tx);
        });

        const txTable = (rows) => `
          <div class="table-wrapper">
            <table>
              <thead><tr>
                <th>Tanggal</th><th>Nama Transaksi</th><th>Jenis</th>
                <th class="text-right">Nominal</th><th>Kategori</th><th>Bukti</th><th>Catatan</th>
              </tr></thead>
              <tbody>
                ${rows.map(tx => `
                  <tr class="${tx.type}">
                    <td>${fmtDate(tx.date)}</td>
                    <td>${tx.name}</td>
                    <td><span class="badge badge-${tx.type}">${tx.type === 'masuk' ? 'Masuk' : 'Keluar'}</span></td>
                    <td class="text-right amount-${tx.type}">${fmt.format(tx.amount)}</td>
                    <td class="text-muted">${tx.category_name || '–'}</td>
                    <td>${tx.proof_image ? `<img class="proof-thumb" src="${tx.proof_image}" onclick="openLightbox('${tx.proof_image}')" />` : '–'}</td>
                    <td class="text-muted">${tx.note || '–'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`;

        const umumSection = txUmum.length === 0 ? '' : `
          <div style="margin-bottom:1rem">
            <div class="card-title" style="font-size:.8rem; color:var(--gray-500); margin-bottom:.4rem">💸 Reimburse Umum (${txUmum.length} transaksi)</div>
            ${txTable(txUmum)}
          </div>`;

        const caSection = Object.values(caGroups).map(group => {
          const tot = group.txs.reduce((s, t) => s + (t.type === 'keluar' ? t.amount : -t.amount), 0);
          return `
            <div style="margin-bottom:1rem">
              <div class="card-title" style="font-size:.8rem; color:var(--gray-500); margin-bottom:.4rem">
                💼 CA: ${group.title}
                <span class="text-muted" style="font-weight:400">&nbsp;·&nbsp;${group.txs.length} transaksi&nbsp;·&nbsp;Kekurangan: <span class="${tot >= 0 ? 'amount-keluar' : 'amount-masuk'}">${fmt.format(Math.abs(tot))}</span></span>
              </div>
              ${txTable(group.txs)}
            </div>`;
        }).join('');

        return `
          <div class="employee-block">
            <details open>
              <summary>
                <div class="employee-name">👤 ${emp.fullName} <span class="text-muted" style="font-weight:400;font-size:.8rem">@${emp.username}</span>
                  <span class="text-muted" style="font-size:.75rem; margin-left:.5rem">(${emp.transactions.length} transaksi)</span>
                </div>
                <div class="employee-stats">
                  <div class="emp-stat"><span class="emp-stat-label">Masuk</span><span class="emp-stat-val amount-masuk">${fmt.format(emp.totalMasuk)}</span></div>
                  <div class="emp-stat"><span class="emp-stat-label">Keluar</span><span class="emp-stat-val amount-keluar">${fmt.format(emp.totalKeluar)}</span></div>
                  <div class="emp-stat">
                    <span class="emp-stat-label ${emp.net >= 0 ? 'amount-masuk' : 'amount-keluar'}" style="font-weight:600">${emp.net >= 0 ? 'Sisa Dana' : 'Klaim'}</span>
                    <span class="emp-stat-val ${emp.net >= 0 ? 'amount-masuk' : 'amount-keluar'}">${fmt.format(Math.abs(emp.net))}</span>
                  </div>
                </div>
              </summary>
              <div class="employee-body">
                ${umumSection}
                ${caSection || (txUmum.length === 0 ? '<div class="empty">Tidak ada transaksi</div>' : '')}
              </div>
            </details>
          </div>`;
      }).join('');
    }

    // ─── Lightbox ─────────────────────────────
    function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
    document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });

    // ─── Print / PDF ──────────────────────────
    document.getElementById('btnPrint').addEventListener('click', () => window.print());

    // ─── Share Link ───────────────────────────
    document.getElementById('btnShare').addEventListener('click', async () => {
      const employeeId = document.getElementById('filterEmployee').value;
      const periodType = document.getElementById('periodType').value;
      const periodValue = document.getElementById('periodValue').value;
      const projectId = document.getElementById('filterProject').value;
      const categoryId = document.getElementById('filterCategory').value;
      const caId = document.getElementById('filterCa').value;
      
      const empLabel = document.getElementById('filterEmployee').options[document.getElementById('filterEmployee').selectedIndex].text;
      const label = `${empLabel} — ${periodType === 'all' ? 'Semua Waktu' : periodValue}`;

      const btn = document.getElementById('btnShare');
      btn.disabled = true; btn.textContent = 'Membuat link...';
      try {
        const res = await fetch('/api/share', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: employeeId, periodType, periodValue, projectId, categoryId, caId, label })
        });
        const data = await res.json();
        const fullUrl = window.location.origin + data.url;
        await navigator.clipboard.writeText(fullUrl).catch(() => {});
        hideAlert('mainAlert');
        // Show share modal
        document.getElementById('shareUrl').value = fullUrl;
        document.getElementById('shareOverlay').classList.add('open');
      } catch { showAlert('mainAlert', 'Gagal membuat link'); }
      finally { btn.disabled = false; btn.textContent = 'Bagikan Link'; }
    });

    document.getElementById('shareClose').addEventListener('click', () => document.getElementById('shareOverlay').classList.remove('open'));
    document.getElementById('copyUrl').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('shareUrl').value);
      document.getElementById('copyUrl').textContent = 'Tersalin!';
      setTimeout(() => document.getElementById('copyUrl').textContent = 'Salin', 2000);
    });
    document.getElementById('waShare').addEventListener('click', () => {
      const url = document.getElementById('shareUrl').value;
      window.open('https://wa.me/?text=' + encodeURIComponent('Laporan keuangan: ' + url), '_blank');
    });
    document.getElementById('smsShare').addEventListener('click', () => {
      const url = document.getElementById('shareUrl').value;
      window.location.href = 'sms:?body=' + encodeURIComponent('Laporan keuangan: ' + url);
    });

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideAlert(id) {
      document.getElementById(id).classList.remove('show');
    }
  </script>
</body>
</html>
