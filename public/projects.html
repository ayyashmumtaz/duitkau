<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Kelola Proyek</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/layout.js"></script>
  <script src="/js/utils.js"></script>
</head>
<body data-page="projects">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <!-- Main -->
    <main class="main-content">
      <div class="flex items-center justify-between" style="margin-bottom:1.25rem">
        <h1 class="page-title" style="margin-bottom:0">Kelola Proyek</h1>
        <button class="btn btn-primary" id="btnAdd">+ Tambah Proyek</button>
      </div>

      <div id="mainAlert" class="alert alert-error"></div>
      <div id="mainSuccess" class="alert alert-success"></div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Proyek</th>
                <th>Deskripsi</th>
                <th>Jumlah Transaksi</th>
                <th>Dibuat</th>
                <th class="text-right">Aksi</th>
              </tr>
            </thead>
            <tbody id="projBody">
              <tr>
                <td colspan="6">
                  <div class="empty"><div class="empty-icon">🔄</div>Memuat data...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Tambah/Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Tambah Proyek</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="modalAlert" class="alert alert-error"></div>
        <form id="projForm">
          <input type="hidden" id="projId" />
          <div class="form-group">
            <label for="projName">Nama Proyek</label>
            <input type="text" id="projName" placeholder="Contoh: Proyek Alfa" required />
          </div>
          <div class="form-group">
            <label for="projDesc">Deskripsi (opsional)</label>
            <textarea id="projDesc" placeholder="Keterangan singkat proyek..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnCancel">Batal</button>
        <button class="btn btn-primary" id="btnSave">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Hapus Proyek</span>
        <button class="modal-close" id="deleteClose">✕</button>
      </div>
      <div class="modal-body">
        <p>Hapus proyek <strong id="deleteName"></strong>?</p>
        <p class="text-muted mt-1" style="font-size:.85rem">Transaksi yang terhubung ke proyek ini akan kehilangan asosiasi proyeknya, namun tidak dihapus.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnDeleteCancel">Batal</button>
        <button class="btn btn-danger" id="btnDeleteConfirm">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <div id="modals-placeholder"></div>

  <script>
    const fmtDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    let deleteTargetId = null;

    window.onLayoutReady = async function(user) {
      await loadProjects();
    };

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects');
        const data = await res.json();
        renderTable(data);
      } catch {
        showAlert('mainAlert', 'Gagal memuat data proyek');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('projBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📁</div>Belum ada proyek</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((proj, i) => `
        <tr>
          <td class="text-muted">${i + 1}</td>
          <td><strong>${proj.name}</strong></td>
          <td class="text-muted">${proj.description || '–'}</td>
          <td class="text-muted">${proj.tx_count} transaksi</td>
          <td class="text-muted">${fmtDate(proj.created_at)}</td>
          <td class="text-right">
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${proj.id}, '${proj.name.replace(/'/g, "\\'")}', '${(proj.description || '').replace(/'/g, "\\'")}')">✏️ Edit</button>
            <button class="btn btn-danger btn-sm" style="margin-left:.3rem" onclick="openDelete(${proj.id}, '${proj.name.replace(/'/g, "\\'")}')">🗑️ Hapus</button>
          </td>
        </tr>
      `).join('');
    }

    // ─── Modal Tambah/Edit ────────────────────
    function openAdd() {
      document.getElementById('modalTitle').textContent = 'Tambah Proyek';
      document.getElementById('projId').value = '';
      document.getElementById('projName').value = '';
      document.getElementById('projDesc').value = '';
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('projName').focus();
    }

    function openEdit(id, name, description) {
      document.getElementById('modalTitle').textContent = 'Edit Proyek';
      document.getElementById('projId').value = id;
      document.getElementById('projName').value = name;
      document.getElementById('projDesc').value = description;
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('projName').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    document.getElementById('btnAdd').addEventListener('click', openAdd);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    document.getElementById('btnSave').addEventListener('click', async () => {
      hideAlert('modalAlert');
      const id = document.getElementById('projId').value;
      const body = {
        name: document.getElementById('projName').value.trim(),
        description: document.getElementById('projDesc').value.trim(),
      };

      if (!body.name) {
        showAlert('modalAlert', 'Nama proyek wajib diisi');
        return;
      }

      const btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      try {
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/projects/${id}` : '/api/projects';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) { showAlert('modalAlert', data.error); return; }

        closeModal();
        showAlert('mainSuccess', id ? 'Proyek berhasil diperbarui!' : 'Proyek berhasil ditambahkan!');
        await loadProjects();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        showAlert('modalAlert', 'Terjadi kesalahan, coba lagi');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Simpan';
      }
    });

    // ─── Modal Hapus ──────────────────────────
    function openDelete(id, name) {
      deleteTargetId = id;
      document.getElementById('deleteName').textContent = name;
      document.getElementById('deleteOverlay').classList.add('open');
    }

    function closeDelete() {
      document.getElementById('deleteOverlay').classList.remove('open');
      deleteTargetId = null;
    }

    document.getElementById('deleteClose').addEventListener('click', closeDelete);
    document.getElementById('btnDeleteCancel').addEventListener('click', closeDelete);
    document.getElementById('deleteOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteOverlay')) closeDelete();
    });

    document.getElementById('btnDeleteConfirm').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      const btn = document.getElementById('btnDeleteConfirm');
      btn.disabled = true;
      btn.textContent = 'Menghapus...';
      try {
        const res = await fetch(`/api/projects/${deleteTargetId}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
          const d = await res.json();
          alert(d.error || 'Gagal menghapus');
          return;
        }
        closeDelete();
        showAlert('mainSuccess', 'Proyek berhasil dihapus');
        await loadProjects();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        alert('Terjadi kesalahan');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Hapus';
      }
    });

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideAlert(id) {
      document.getElementById(id).classList.remove('show');
    }
  </script>
</body>
</html>
