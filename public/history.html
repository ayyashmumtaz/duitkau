<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Riwayat Pengeluaran</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/layout.js"></script>
</head>
<body data-page="history">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <!-- Print header (hidden on screen) -->
      <div class="print-header">
        <img src="/assets/logo/logo-CSK.png" alt="Logo" />
        <h2>Riwayat Pengeluaran</h2>
        <p id="printMeta"></p>
      </div>

      <div class="flex items-center justify-between" style="margin-bottom:1rem; flex-wrap:wrap; gap:.5rem">
        <h1 class="page-title" style="margin-bottom:0">Riwayat Pengeluaran</h1>
        <div style="display:flex; gap:.5rem">
          <button class="btn btn-ghost btn-sm no-print" id="btnShare">Bagikan Link</button>
          <button class="btn btn-ghost btn-sm no-print" id="btnPrint">Download PDF</button>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-grid no-print" style="grid-template-columns:repeat(2,1fr); margin-bottom:1.25rem">
        <div class="summary-card masuk">
          <div class="summary-label">Total Pemasukan</div>
          <div class="summary-value green" id="totalMasuk">Rp 0</div>
        </div>
        <div class="summary-card keluar">
          <div class="summary-label">Total Pengeluaran</div>
          <div class="summary-value red" id="totalKeluar">Rp 0</div>
        </div>
      </div>

      <div class="card">
        <div class="flex items-center justify-between no-print" style="margin-bottom:1rem; flex-wrap:wrap; gap:.5rem">
          <div class="card-title" style="margin-bottom:0">Daftar Transaksi</div>
          <div class="filter-bar" style="margin-bottom:0">
            <input type="month" id="filterMonth" />
            <button class="btn btn-ghost btn-sm" id="clearFilter">Semua</button>
          </div>
        </div>

        <div id="tableAlert" class="alert alert-error"></div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Nama</th>
                <th>Jenis</th>
                <th>Kategori</th>
                <th>Cash Advance</th>
                <th>Proyek</th>
                <th class="text-right">Nominal</th>
                <th>Diinput oleh</th>
                <th>Bukti</th>
              </tr>
            </thead>
            <tbody id="txBody">
              <tr><td colspan="9"><div class="empty"><div class="empty-icon">🔄</div>Memuat data...</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Bukti transaksi" />
  </div>

  <div id="modals-placeholder"></div>

  <!-- Share Modal -->
  <div class="modal-overlay" id="shareOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Link Laporan</span>
        <button class="modal-close" id="shareClose">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:.85rem; color:var(--gray-600); margin-bottom:.75rem">Link ini bisa dibuka siapapun tanpa login. Salin dan kirim via WhatsApp / SMS.</p>
        <div style="display:flex; gap:.5rem">
          <input type="text" id="shareUrl" readonly style="flex:1; font-size:.8rem" />
          <button class="btn btn-primary btn-sm" id="copyUrl">Salin</button>
        </div>
        <div style="margin-top:.75rem; display:flex; gap:.5rem; flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="waShare">WhatsApp</button>
          <button class="btn btn-ghost btn-sm" id="smsShare">SMS</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
    const fmtDate = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

    window.onLayoutReady = async function(user) {
      await loadTransactions(null);
    };

    // ─── Load transactions ────────────────────
    async function loadTransactions(month) {
      const url = month ? `/api/transactions?month=${month}` : '/api/transactions';
      try {
        const txs = await fetch(url).then(r => r.json());
        renderTable(txs);
        updateSummary(txs);
      } catch { showAlert('tableAlert', 'Gagal memuat transaksi'); }
    }

    function renderTable(txs) {
      const tbody = document.getElementById('txBody');
      if (txs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">📭</div>Belum ada transaksi</div></td></tr>`;
        return;
      }
      tbody.innerHTML = txs.map(tx => `
        <tr class="${tx.type}">
          <td>${fmtDate(tx.date)}</td>
          <td>
            <div>${tx.name}</div>
            ${tx.note ? `<div class="text-muted" style="font-size:.75rem">${tx.note}</div>` : ''}
          </td>
          <td><span class="badge badge-${tx.type}">${tx.type === 'masuk' ? 'Masuk' : 'Keluar'}</span></td>
          <td class="text-muted">${tx.category_name || '–'}</td>
          <td class="text-muted">${tx.ca_title || '–'}</td>
          <td class="text-muted">${tx.project_name || '–'}</td>
          <td class="text-right amount-${tx.type}">${fmt.format(tx.amount)}</td>
          <td class="text-muted" style="font-size:.8rem">${tx.input_by_name || '–'}</td>
          <td>
            ${tx.proof_image
              ? `<img class="proof-thumb" src="${tx.proof_image}" onclick="openLightbox('${tx.proof_image}')" title="Lihat bukti" />`
              : `<span class="text-muted">–</span>`}
          </td>
        </tr>
      `).join('');
    }

    function updateSummary(txs) {
      const masuk = txs.filter(t => t.type === 'masuk').reduce((s, t) => s + t.amount, 0);
      const keluar = txs.filter(t => t.type === 'keluar').reduce((s, t) => s + t.amount, 0);
      document.getElementById('totalMasuk').textContent = fmt.format(masuk);
      document.getElementById('totalKeluar').textContent = fmt.format(keluar);
    }

    // ─── Filter ───────────────────────────────
    document.getElementById('filterMonth').addEventListener('change', (e) => loadTransactions(e.target.value || null));
    document.getElementById('clearFilter').addEventListener('click', () => {
      document.getElementById('filterMonth').value = '';
      loadTransactions(null);
    });

    // ─── Print / PDF ──────────────────────────
    document.getElementById('btnPrint').addEventListener('click', () => {
      const month = document.getElementById('filterMonth').value;
      const label = month ? new Date(month + '-01').toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }) : 'Semua Waktu';
      document.getElementById('printMeta').textContent = `Nama: ${window.currentUser.fullName} | Periode: ${label} | Dicetak: ${new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' })}`;
      window.print();
    });

    // ─── Share Link ───────────────────────────
    document.getElementById('btnShare').addEventListener('click', async () => {
      const month = document.getElementById('filterMonth').value;
      const periodType = month ? 'month' : 'all';
      const periodValue = month || '';
      const label = `${window.currentUser.fullName} — ${periodType === 'all' ? 'Semua Waktu' : periodValue}`;

      const btn = document.getElementById('btnShare');
      btn.disabled = true; btn.textContent = 'Membuat link...';
      try {
        const res = await fetch('/api/share', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: window.currentUser.userId, periodType, periodValue, projectId: '', label })
        });
        const data = await res.json();
        const fullUrl = window.location.origin + data.url;
        await navigator.clipboard.writeText(fullUrl).catch(() => {});
        hideAlert('tableAlert');
        // Show share modal
        document.getElementById('shareUrl').value = fullUrl;
        document.getElementById('shareOverlay').classList.add('open');
      } catch { showAlert('tableAlert', 'Gagal membuat link'); }
      finally { btn.disabled = false; btn.textContent = 'Bagikan Link'; }
    });

    document.getElementById('shareClose').addEventListener('click', () => document.getElementById('shareOverlay').classList.remove('open'));
    document.getElementById('copyUrl').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('shareUrl').value);
      document.getElementById('copyUrl').textContent = 'Tersalin!';
      setTimeout(() => document.getElementById('copyUrl').textContent = 'Salin', 2000);
    });
    document.getElementById('waShare').addEventListener('click', () => {
      const url = document.getElementById('shareUrl').value;
      window.open('https://wa.me/?text=' + encodeURIComponent('Catatan Riwayat Transaksi (' + window.currentUser.fullName + '): ' + url), '_blank');
    });
    document.getElementById('smsShare').addEventListener('click', () => {
      const url = document.getElementById('shareUrl').value;
      window.location.href = 'sms:?body=' + encodeURIComponent('Catatan Riwayat Transaksi (' + window.currentUser.fullName + '): ' + url);
    });

    // ─── Lightbox ─────────────────────────────
    function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
    document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });

    function showAlert(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }
    function hideAlert(id) { document.getElementById(id).classList.remove('show'); }
  </script>
</body>
</html>
