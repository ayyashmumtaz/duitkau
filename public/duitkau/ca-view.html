<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Detail Cash Advance</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--gray-100, #f3f4f6); }

    .view-wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* ── Hero header ── */
    .ca-hero {
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--gray-100);
      padding: 1.5rem 1.75rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .ca-hero-left { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0; }
    .ca-hero-logo { height: 32px; flex-shrink: 0; }
    .ca-hero-divider { width: 1px; height: 36px; background: var(--gray-200); flex-shrink: 0; }
    .ca-hero-title { font-size: 1.15rem; font-weight: 700; color: var(--gray-800); line-height: 1.3; }
    .ca-hero-sub { font-size: .8rem; color: var(--gray-400); margin-top: .2rem; }
    .ca-hero-right { display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .3rem .75rem; border-radius: 999px;
      font-size: .78rem; font-weight: 600; border: 1px solid transparent;
    }
    .status-pending   { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .status-open      { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .status-pending_close { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
    .status-closed    { background: var(--gray-100); color: var(--gray-500); border-color: var(--gray-200); }
    .status-rejected  { background: #fee2e2; color: #991b1b; border-color: #fecaca; }

    /* ── Info grid ── */
    .info-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--gray-100);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    .info-card-title {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--gray-400); margin-bottom: .75rem;
    }
    .info-rows { display: grid; grid-template-columns: auto 1fr; gap: 0 1.25rem; }
    .info-label {
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; color: var(--gray-400);
      padding: .38rem 0; white-space: nowrap;
    }
    .info-value { font-size: .875rem; color: var(--gray-700); padding: .38rem 0; }
    .info-divider {
      grid-column: 1 / -1;
      height: 1px; background: var(--gray-100);
      margin: .5rem 0;
    }

    /* ── Cost breakdown ── */
    .breakdown-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: .5rem; margin-top: .25rem;
    }
    .breakdown-item {
      background: var(--gray-50, #f9fafb);
      border: 1px solid var(--gray-100);
      border-radius: 8px; padding: .6rem .85rem;
    }
    .breakdown-item-label { font-size: .72rem; color: var(--gray-400); margin-bottom: .2rem; }
    .breakdown-item-value { font-size: .9rem; font-weight: 600; color: var(--gray-700); }

    /* ── Approval tracker ── */
    .approval-track { display: flex; flex-direction: column; gap: .35rem; margin-top: .5rem; }
    .approval-row {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .4rem .65rem;
      background: var(--gray-50, #f9fafb);
      border: 1px solid var(--gray-100);
      border-radius: 8px;
    }
    .approval-icon { font-size: .9rem; line-height: 1.5; flex-shrink: 0; }
    .approval-name { font-size: .84rem; color: var(--gray-700); flex: 1; }
    .approval-reason { font-size: .75rem; color: #dc2626; margin-top: .1rem; }
    .approval-status-label { font-size: .72rem; font-weight: 600; white-space: nowrap; margin-top: .15rem; }

    /* ── Summary ── */
    .summary-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .75rem; margin-bottom: 1rem;
    }
    .sum-card {
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: 12px; padding: 1rem 1.25rem;
      text-align: center;
    }
    .sum-label { font-size: .75rem; color: var(--gray-400); margin-bottom: .35rem; }
    .sum-value { font-size: 1.05rem; font-weight: 700; }
    .sum-green { color: #16a34a; }
    .sum-red   { color: #dc2626; }
    .sum-blue  { color: #2563eb; }

    /* ── Transactions ── */
    .tx-card {
      background: #fff; border-radius: 12px;
      border: 1px solid var(--gray-100);
      overflow: hidden;
    }
    .tx-card-header {
      padding: .9rem 1.25rem;
      border-bottom: 1px solid var(--gray-100);
      font-size: .7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400);
    }

    /* ── Loading / Error ── */
    .center-state { text-align: center; padding: 5rem 1rem; }
    .center-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .center-state h2 { font-size: 1.1rem; font-weight: 700; color: var(--gray-700); margin-bottom: .4rem; }
    .center-state p { font-size: .875rem; color: var(--gray-400); }

    @media (max-width: 540px) {
      .summary-row { grid-template-columns: 1fr 1fr; }
      .summary-row .sum-card:last-child { grid-column: 1 / -1; }
      .breakdown-grid { grid-template-columns: 1fr; }
      .ca-hero { padding: 1.1rem 1.1rem; }
    }
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .view-wrap { padding: 0; max-width: 100%; }
      .ca-hero, .info-card, .tx-card, .sum-card { border: 1px solid #e5e7eb; box-shadow: none; }
    }
  </style>
</head>
<body>
  <!-- Lightbox -->
  <div id="lightbox" style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center">
    <div style="position:absolute;top:1rem;right:1.25rem;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Bukti" style="max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain" />
  </div>

  <div class="view-wrap">
    <!-- Loading -->
    <div id="loadingState" class="center-state">
      <div class="icon">🔄</div>
      <p>Memuat data...</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="center-state" style="display:none">
      <div class="icon">🔒</div>
      <h2>Link Tidak Valid</h2>
      <p>Link Cash Advance ini tidak ditemukan atau sudah tidak berlaku.</p>
    </div>

    <!-- Content -->
    <div id="caContent" style="display:none">

      <!-- Hero -->
      <div class="ca-hero no-print">
        <div class="ca-hero-left">
          <img class="ca-hero-logo" src="/assets/logo/logo-CSK.png" alt="Logo" />
          <div class="ca-hero-divider"></div>
          <div>
            <div class="ca-hero-title" id="caTitle">Cash Advance</div>
            <div class="ca-hero-sub" id="caSubtitle"></div>
          </div>
        </div>
        <div class="ca-hero-right">
          <span id="caStatusBadge"></span>
          <button class="btn btn-ghost btn-sm" onclick="window.print()">⬇ PDF</button>
        </div>
      </div>

      <!-- Print-only header -->
      <div style="display:none" class="print-only" id="printHeader">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #e5e7eb">
          <img src="/assets/logo/logo-CSK.png" style="height:36px" alt="Logo" />
          <div>
            <div style="font-size:1.1rem;font-weight:700" id="printTitle"></div>
            <div style="font-size:.8rem;color:#6b7280">Cash Advance Document</div>
          </div>
        </div>
      </div>

      <!-- Info -->
      <div class="info-card" id="caInfoCard"></div>

      <!-- Summary -->
      <div class="summary-row" id="caSummary"></div>

      <!-- Transactions -->
      <div class="tx-card">
        <div class="tx-card-header">Transaksi Terkait</div>
        <div class="table-wrapper" style="margin:0">
          <table>
            <thead>
              <tr>
                <th>Tanggal</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th class="text-right">Nominal</th>
                <th>Bukti</th>
              </tr>
            </thead>
            <tbody id="caTxBody">
              <tr><td colspan="5"><div class="empty">Belum ada transaksi</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
    const fmtDate = (d) => {
      if (!d) return '–';
      return new Date((d.includes('T') ? d : d + 'T00:00:00')).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    };
    const fmtDateTime = (d) => {
      if (!d) return '–';
      return new Date(d.replace(' ', 'T')).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const STATUS_LABEL = {
      pending:       'Menunggu Persetujuan',
      open:          'Open (Aktif)',
      pending_close: 'Menunggu Penutupan',
      closed:        'Ditutup',
      rejected:      'Ditolak',
    };
    const STATUS_DOT = { pending: '🟡', open: '🟢', pending_close: '🔵', closed: '⚫', rejected: '🔴' };

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').style.display = 'flex';
    }
    document.getElementById('lightboxClose').addEventListener('click', () => { document.getElementById('lightbox').style.display = 'none'; });
    document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').style.display = 'none'; });

    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = '';
    } else {
      fetch('/api/share/ca/' + token)
        .then(r => r.json())
        .then(data => {
          if (data.error) { document.getElementById('loadingState').style.display = 'none'; document.getElementById('errorState').style.display = ''; return; }
          renderCA(data);
        })
        .catch(() => { document.getElementById('loadingState').style.display = 'none'; document.getElementById('errorState').style.display = ''; });
    }

    function infoRow(label, value) {
      return `<div class="info-label">${label}</div><div class="info-value">${value}</div>`;
    }
    function infoDivider() {
      return `<div class="info-divider"></div>`;
    }

    function renderCA(ca) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('caContent').style.display = '';

      document.title = 'DuitKau – ' + ca.title;
      document.getElementById('caTitle').textContent = ca.title;
      document.getElementById('printTitle').textContent = ca.title;
      document.getElementById('caSubtitle').textContent =
        (ca.project_name || 'Cash Advance') + (ca.start_date ? '  ·  ' + fmtDate(ca.start_date) + ' – ' + fmtDate(ca.end_date) : '');

      // Status badge
      const statusKey = ca.status || 'pending';
      document.getElementById('caStatusBadge').innerHTML =
        `<span class="status-badge status-${statusKey}">${STATUS_DOT[statusKey] || ''} ${STATUS_LABEL[statusKey] || statusKey}</span>`;

      // ── Info card ──────────────────────────────────────────
      const approvals = ca.approvals || [];
      const openApprovals = approvals.filter(a => a.type === 'open');
      const reimburseApprovals = approvals.filter(a => a.type === 'reimburse');

      let infoHtml = '<div class="info-rows">';

      if (ca.description) infoHtml += infoRow('Deskripsi', ca.description);
      if (ca.project_name) infoHtml += infoRow('Proyek', `${ca.project_name}${ca.project_po_number ? ` <span style="color:var(--gray-400);font-size:.8rem">· ${ca.project_po_number}</span>` : ''}`);
      if (ca.start_date)  infoHtml += infoRow('Periode', `${fmtDate(ca.start_date)} — ${fmtDate(ca.end_date)}`);
      infoHtml += infoRow('Diajukan oleh', `${ca.request_by_name || '–'} <span style="color:var(--gray-400);font-size:.8rem">· ${fmtDateTime(ca.request_at)}</span>`);
      infoHtml += infoRow('Total Diajukan', `<strong>${fmt.format(ca.initial_amount)}</strong>`);
      if (ca.open_by_name && openApprovals.length === 0)
        infoHtml += infoRow('Disetujui oleh', `${ca.open_by_name} <span style="color:var(--gray-400);font-size:.8rem">· ${fmtDateTime(ca.open_at)}</span>`);
      if (ca.closed_by_name)
        infoHtml += infoRow('Ditutup oleh', `${ca.closed_by_name} <span style="color:var(--gray-400);font-size:.8rem">· ${fmtDateTime(ca.closed_at)}</span>`);

      infoHtml += '</div>';

      // Cost breakdown
      if (ca.allowance || ca.transport || ca.accommodation || ca.other_expenses) {
        infoHtml += `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--gray-100)">
          <div class="info-card-title">Rincian Biaya</div>
          <div class="breakdown-grid">
            <div class="breakdown-item"><div class="breakdown-item-label">Allowance / Uang Saku</div><div class="breakdown-item-value">${fmt.format(ca.allowance || 0)}</div></div>
            <div class="breakdown-item"><div class="breakdown-item-label">Transport</div><div class="breakdown-item-value">${fmt.format(ca.transport || 0)}</div></div>
            <div class="breakdown-item"><div class="breakdown-item-label">Akomodasi</div><div class="breakdown-item-value">${fmt.format(ca.accommodation || 0)}</div></div>
            <div class="breakdown-item"><div class="breakdown-item-label">Biaya Lainnya</div><div class="breakdown-item-value">${fmt.format(ca.other_expenses || 0)}</div></div>
          </div>
        </div>`;
      }

      // Approval tracker
      const approvalBlock = (title, list) => {
        const approved = list.filter(a => a.status === 'approved').length;
        const items = list.map(a => {
          const icon  = a.status === 'approved' ? '✅' : a.status === 'rejected' ? '❌' : '⏳';
          const color = a.status === 'approved' ? '#16a34a' : a.status === 'rejected' ? '#dc2626' : '#9ca3af';
          const label = a.status === 'approved' ? 'Setuju' : a.status === 'rejected' ? 'Tolak' : 'Menunggu';
          const when  = a.decided_at ? `<span style="color:var(--gray-400);font-size:.75rem"> · ${fmtDateTime(a.decided_at)}</span>` : '';
          const note  = a.reject_reason ? `<div class="approval-reason">${a.reject_reason}</div>` : '';
          return `<div class="approval-row">
            <span class="approval-icon">${icon}</span>
            <div style="flex:1"><div class="approval-name">${a.approver_name}${when}</div>${note}</div>
            <span class="approval-status-label" style="color:${color}">${label}</span>
          </div>`;
        }).join('');
        return `<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--gray-100)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
            <div class="info-card-title" style="margin-bottom:0">${title}</div>
            <span style="font-size:.75rem;color:var(--gray-400)">${approved}/${list.length} menyetujui</span>
          </div>
          <div class="approval-track">${items}</div>
        </div>`;
      };

      if (openApprovals.length > 0)      infoHtml += approvalBlock('Persetujuan CA', openApprovals);
      if (reimburseApprovals.length > 0) infoHtml += approvalBlock('Persetujuan Reimburse', reimburseApprovals);

      document.getElementById('caInfoCard').innerHTML = infoHtml;

      // ── Summary ────────────────────────────────────────────
      const txs = ca.transactions || [];
      const totalMasuk  = txs.filter(t => t.type === 'masuk').reduce((s, t) => s + t.amount, 0);
      const totalKeluar = txs.filter(t => t.type === 'keluar').reduce((s, t) => s + t.amount, 0);
      const sisa = totalMasuk - totalKeluar;
      document.getElementById('caSummary').innerHTML = `
        <div class="sum-card">
          <div class="sum-label">Dana Diterima CA</div>
          <div class="sum-value sum-green">${fmt.format(totalMasuk)}</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Total Pengeluaran</div>
          <div class="sum-value sum-red">${fmt.format(totalKeluar)}</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">${sisa >= 0 ? 'Sisa Dana' : 'Kekurangan'}</div>
          <div class="sum-value ${sisa >= 0 ? 'sum-blue' : 'sum-red'}">${fmt.format(Math.abs(sisa))}</div>
        </div>`;

      // ── Transactions ───────────────────────────────────────
      if (txs.length === 0) {
        document.getElementById('caTxBody').innerHTML =
          `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📭</div>Belum ada transaksi terkait</div></td></tr>`;
      } else {
        document.getElementById('caTxBody').innerHTML = txs.map(tx => `
          <tr class="${tx.type}">
            <td style="white-space:nowrap">${fmtDate(tx.date)}</td>
            <td>
              <div style="font-weight:500">${tx.name}</div>
              ${tx.note ? `<div class="text-muted" style="font-size:.75rem">${tx.note}</div>` : ''}
            </td>
            <td class="text-muted">${tx.category_name || '–'}</td>
            <td class="text-right amount-${tx.type}" style="white-space:nowrap;font-weight:600">${fmt.format(tx.amount)}</td>
            <td>${tx.proof_image
              ? `<img class="proof-thumb" src="${tx.proof_image}" onclick="openLightbox('${tx.proof_image}')" style="cursor:pointer;border-radius:4px" />`
              : '<span class="text-muted">–</span>'}</td>
          </tr>`).join('');
      }
    }
  </script>
</body>
</html>
