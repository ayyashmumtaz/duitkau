<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Kelola Kategori</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/duitkau/js/layout.js"></script>
  <script src="/js/utils.js"></script>
</head>
<body data-page="categories">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <!-- Main -->
    <main class="main-content">
      <div class="flex items-center justify-between" style="margin-bottom:1.25rem">
        <h1 class="page-title" style="margin-bottom:0">Kelola Kategori Transaksi</h1>
        <button class="btn btn-primary" id="btnAdd">+ Tambah Kategori</button>
      </div>

      <div id="mainAlert" class="alert alert-error"></div>
      <div id="mainSuccess" class="alert alert-success"></div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Kategori</th>
                <th>Jumlah Transaksi</th>
                <th>Dibuat</th>
                <th class="text-right">Aksi</th>
              </tr>
            </thead>
            <tbody id="catBody">
              <tr>
                <td colspan="5">
                  <div class="empty"><div class="empty-icon">🔄</div>Memuat data...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Tambah/Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Tambah Kategori</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="modalAlert" class="alert alert-error"></div>
        <form id="catForm">
          <input type="hidden" id="catId" />
          <div class="form-group">
            <label for="catName">Nama Kategori</label>
            <input type="text" id="catName" placeholder="Contoh: Transport, Makan, Beli Barang..." required />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnCancel">Batal</button>
        <button class="btn btn-primary" id="btnSave">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Hapus Kategori</span>
        <button class="modal-close" id="deleteClose">✕</button>
      </div>
      <div class="modal-body">
        <p>Hapus kategori <strong id="deleteName"></strong>?</p>
        <p class="text-muted mt-1" style="font-size:.85rem">Tidak bisa dihapus jika masih ada transaksi yang menggunakan kategori ini.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnDeleteCancel">Batal</button>
        <button class="btn btn-danger" id="btnDeleteConfirm">Hapus</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <div id="modals-placeholder"></div>

  <script>
    const fmtDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    let deleteTargetId = null;

    let _isSuperAdmin = false;
    window.onLayoutReady = async function(user) {
      _isSuperAdmin = user.role === 'super_admin';
      if (!_isSuperAdmin) document.getElementById('btnAdd').style.display = 'none';
      await loadCategories();
    };

    async function loadCategories() {
      try {
        const data = await fetch('/api/categories').then(r => r.json());
        renderTable(data);
      } catch {
        showAlert('mainAlert', 'Gagal memuat data kategori');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('catBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">🏷️</div>Belum ada kategori</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((cat, i) => `
        <tr>
          <td class="text-muted">${i + 1}</td>
          <td><strong>${cat.name}</strong></td>
          <td class="text-muted">${cat.tx_count} transaksi</td>
          <td class="text-muted">${fmtDate(cat.created_at)}</td>
          <td class="text-right">
            ${_isSuperAdmin ? `
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${cat.id}, '${cat.name.replace(/'/g, "\\'")}')">✏️ Edit</button>
            <button class="btn btn-danger btn-sm" style="margin-left:.3rem" onclick="openDelete(${cat.id}, '${cat.name.replace(/'/g, "\\'")}')">🗑️ Hapus</button>
            ` : '–'}
          </td>
        </tr>
      `).join('');
    }

    // ─── Modal Tambah/Edit ────────────────────
    function openAdd() {
      document.getElementById('modalTitle').textContent = 'Tambah Kategori';
      document.getElementById('catId').value = '';
      document.getElementById('catName').value = '';
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('catName').focus();
    }

    function openEdit(id, name) {
      document.getElementById('modalTitle').textContent = 'Edit Kategori';
      document.getElementById('catId').value = id;
      document.getElementById('catName').value = name;
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('catName').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    document.getElementById('btnAdd').addEventListener('click', openAdd);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    document.getElementById('btnSave').addEventListener('click', async () => {
      hideAlert('modalAlert');
      const id = document.getElementById('catId').value;
      const name = document.getElementById('catName').value.trim();

      if (!name) {
        showAlert('modalAlert', 'Nama kategori wajib diisi');
        return;
      }

      const btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      try {
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/categories/${id}` : '/api/categories';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (!res.ok) { showAlert('modalAlert', data.error); return; }

        closeModal();
        showAlert('mainSuccess', id ? 'Kategori berhasil diperbarui!' : 'Kategori berhasil ditambahkan!');
        await loadCategories();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        showAlert('modalAlert', 'Terjadi kesalahan, coba lagi');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Simpan';
      }
    });

    // ─── Modal Hapus ──────────────────────────
    function openDelete(id, name) {
      deleteTargetId = id;
      document.getElementById('deleteName').textContent = name;
      document.getElementById('deleteOverlay').classList.add('open');
    }

    function closeDelete() {
      document.getElementById('deleteOverlay').classList.remove('open');
      deleteTargetId = null;
    }

    document.getElementById('deleteClose').addEventListener('click', closeDelete);
    document.getElementById('btnDeleteCancel').addEventListener('click', closeDelete);
    document.getElementById('deleteOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteOverlay')) closeDelete();
    });

    document.getElementById('btnDeleteConfirm').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      const btn = document.getElementById('btnDeleteConfirm');
      btn.disabled = true;
      btn.textContent = 'Menghapus...';
      try {
        const res = await fetch(`/api/categories/${deleteTargetId}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
          const d = await res.json();
          showAlert('mainAlert', d.error || 'Gagal menghapus');
          closeDelete();
          return;
        }
        closeDelete();
        showAlert('mainSuccess', 'Kategori berhasil dihapus');
        await loadCategories();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        showAlert('mainAlert', 'Terjadi kesalahan');
        closeDelete();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Hapus';
      }
    });

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideAlert(id) {
      document.getElementById(id).classList.remove('show');
    }
  </script>
</body>
</html>
