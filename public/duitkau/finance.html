<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Dashboard Finance</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/duitkau/js/layout.js"></script>
  <style>
    /* ── Summary grid responsive ── */
    .summary-grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 767px) {
      .summary-grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Employee block header ── */
    .emp-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .employee-stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    @media (max-width: 767px) {
      .employee-stats { gap: .6rem; }
      .emp-stat-label { font-size: .7rem; }
      .emp-stat-val   { font-size: .85rem; }
    }

    /* ── Responsive transaction table ── */
    .tx-responsive-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    .tx-responsive-table thead th {
      text-align: left; padding: .45rem .75rem; font-weight: 600;
      color: var(--gray-500); border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    .tx-responsive-table thead th.text-right { text-align: right; }
    .tx-responsive-table thead th.text-center { text-align: center; }
    .tx-responsive-table tbody td { padding: .45rem .75rem; vertical-align: middle; }
    .tx-responsive-table tfoot td { padding: .5rem .75rem; border-top: 1px solid var(--gray-200); }

    @media (max-width: 767px) {
      .tx-responsive-table thead { display: none; }
      .tx-responsive-table tfoot { display: none; }
      .tx-responsive-table tbody tr {
        display: block;
        border-bottom: 1px solid var(--gray-100);
        padding: .6rem 0;
      }
      .tx-responsive-table tbody tr:last-child { border-bottom: none; }
      .tx-responsive-table tbody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: .2rem .5rem;
        font-size: .82rem;
      }
      .tx-responsive-table tbody td::before {
        content: attr(data-label);
        color: var(--gray-500);
        font-size: .75rem;
        flex-shrink: 0;
        margin-right: .5rem;
      }
      .tx-responsive-table tbody td.no-label::before { display: none; }
      .tx-responsive-table tbody td.no-label { justify-content: flex-end; }
      .tx-responsive-table tbody td[data-label="Nominal"] { font-weight: 700; }
      /* hide low-priority columns on mobile */
      .tx-responsive-table tbody td[data-label="Proyek"],
      .tx-responsive-table tbody td[data-label="Catatan"] { display: none; }
    }

    /* ── Filter bar ── */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: .75rem;
    }

    /* ── Tabs ── */
    .dash-tab {
      background: none; border: none; cursor: pointer;
      padding: .55rem 1.1rem; font-size: .9rem; font-weight: 600;
      color: var(--gray-500); border-bottom: 2px solid transparent;
      margin-bottom: -2px; border-radius: 0; transition: color .15s;
    }
    .dash-tab:hover { color: var(--gray-700); }
    .dash-tab.active { color: var(--primary, #6366f1); border-bottom-color: var(--primary, #6366f1); }
  </style>
</head>
<body data-page="finance">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div id="mainAlert" class="alert alert-error"></div>
      <div id="mainSuccess" class="alert alert-success"></div>

      <!-- Tab switcher -->
      <div style="display:flex;gap:.5rem;margin-bottom:1.25rem;border-bottom:2px solid var(--gray-200);padding-bottom:0">
        <button class="dash-tab active" id="tabCa" onclick="switchTab('ca')">💳 Dashboard CA</button>
        <button class="dash-tab" id="tabReimburse" onclick="switchTab('reimburse')">📊 Laporan Reimburse Umum</button>
      </div>

      <!-- ═══ Dashboard CA ═══ -->
      <div id="sectionCa">
        <div class="dash-header">
          <h2 style="font-size:1rem;font-weight:700;margin:0">💳 Cash Advance</h2>
          <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
            <input type="text" id="caSearchSo" placeholder="Cari nomor SO..." style="padding:.4rem .75rem;border:1px solid var(--gray-300);border-radius:6px;font-size:.875rem;width:180px" />
            <button class="btn btn-ghost btn-sm" id="caClearSearch">✕ Reset</button>
          </div>
        </div>

        <div class="summary-grid-4" id="caSummaryGrid">
          <div class="summary-card masuk">
            <div class="summary-label">CA Open</div>
            <div class="summary-value green" id="caStatOpen">0</div>
          </div>
          <div class="summary-card keluar">
            <div class="summary-label">Belum Dibayar</div>
            <div class="summary-value red" id="caStatUnpaid">0</div>
          </div>
          <div class="summary-card net-positive">
            <div class="summary-label">Total Dana CA Open</div>
            <div class="summary-value blue" id="caStatTotal">Rp 0</div>
          </div>
          <div class="summary-card net-negative">
            <div class="summary-label">CA Closed</div>
            <div class="summary-value orange" id="caStatClosed">0</div>
          </div>
        </div>

        <div class="card">
          <div id="caList"><div class="empty"><div class="empty-icon">🔄</div>Memuat data...</div></div>
        </div>
      </div>

      <!-- ═══ Laporan Reimburse ═══ -->
      <div id="sectionReimburse" style="display:none">
        <div class="dash-header">
          <h2 style="font-size:1rem;font-weight:700;margin:0">📊 Laporan Reimburse Umum</h2>
          <div class="filter-bar" style="margin-bottom:0">
            <label>Periode:</label>
            <input type="month" id="filterMonth" />
            <button class="btn btn-ghost btn-sm" id="clearFilter">Semua</button>
          </div>
        </div>

        <div class="summary-grid-4">
          <div class="summary-card masuk">
            <div class="summary-label">Total Pemasukan</div>
            <div class="summary-value green" id="grandMasuk">Rp 0</div>
          </div>
          <div class="summary-card keluar">
            <div class="summary-label">Total Pengeluaran</div>
            <div class="summary-value red" id="grandKeluar">Rp 0</div>
          </div>
          <div class="summary-card net-positive">
            <div class="summary-label">Total Sisa Dana</div>
            <div class="summary-value blue" id="grandSisa">Rp 0</div>
          </div>
          <div class="summary-card net-negative">
            <div class="summary-label">Total Klaim</div>
            <div class="summary-value orange" id="grandKlaim">Rp 0</div>
          </div>
        </div>

        <div id="employeeList">
          <div class="card" style="text-align:center; padding:2rem; color:var(--gray-400)">
            🔄 Memuat data...
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Bukti transaksi" />
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <div id="modals-placeholder"></div>

  <script>
    const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
    const fmtDate = (d) => {
      if (!d) return '–';
      const iso = String(d).replace(' ', 'T');
      return new Date(iso.includes('T') ? iso : iso + 'T00:00:00').toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    };

    let _caData = [];
    let _activeTab = 'ca';

    window.onLayoutReady = async function(user) {
      await loadCaDashboard();
    };

    // ─── Tab switching ─────────────────────────
    function switchTab(tab) {
      _activeTab = tab;
      document.getElementById('sectionCa').style.display        = tab === 'ca' ? '' : 'none';
      document.getElementById('sectionReimburse').style.display = tab === 'reimburse' ? '' : 'none';
      document.getElementById('tabCa').classList.toggle('active',        tab === 'ca');
      document.getElementById('tabReimburse').classList.toggle('active', tab === 'reimburse');
      if (tab === 'reimburse' && !_reimburseLoaded) {
        _reimburseLoaded = true;
        loadSummary(null);
      }
    }

    // ─── Dashboard CA ──────────────────────────
    async function loadCaDashboard() {
      try {
        _caData = await fetch('/api/ca').then(r => r.json());
        renderCaDashboard(_caData, '');
      } catch {
        document.getElementById('caList').innerHTML = `<div class="empty">Gagal memuat data CA</div>`;
      }
    }

    function renderCaDashboard(cas, soQuery) {
      const q = (soQuery || '').toLowerCase().trim();
      const filtered = q
        ? cas.filter(ca => (ca.project_po_number || '').toLowerCase().includes(q)
            || (ca.project_name || '').toLowerCase().includes(q)
            || (ca.title || '').toLowerCase().includes(q)
            || (ca.request_by_name || '').toLowerCase().includes(q))
        : cas;

      // Summary
      const open   = filtered.filter(ca => ca.status === 'open');
      const unpaid = open.filter(ca => ca.payment_status === 'unpaid');
      const closed = filtered.filter(ca => ca.status === 'closed');
      document.getElementById('caStatOpen').textContent   = open.length;
      document.getElementById('caStatUnpaid').textContent = unpaid.length;
      document.getElementById('caStatTotal').textContent  = fmt.format(open.reduce((s, ca) => s + (ca.initial_amount || 0), 0));
      document.getElementById('caStatClosed').textContent = closed.length;

      const el = document.getElementById('caList');
      if (filtered.length === 0) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>${q ? 'Tidak ada CA dengan SO tersebut' : 'Belum ada Cash Advance'}</div>`;
        return;
      }

      const STATUS_LABEL = {
        pending:       '<span class="badge" style="background:#fef3c7;color:#7c2d12">Menunggu</span>',
        open:          '<span class="badge badge-masuk">Open</span>',
        pending_close: '<span class="badge" style="background:#3b82f6;color:#fff">Request Close</span>',
        closed:        '<span class="badge" style="background:var(--gray-400);color:#fff">Closed</span>',
        rejected:      '<span class="badge badge-keluar">Ditolak</span>',
      };

      el.innerHTML = `<div class="table-wrapper"><table class="tx-responsive-table">
        <thead><tr>
          <th>Nomor SO</th>
          <th>Judul CA</th>
          <th>Karyawan</th>
          <th class="text-right">Total</th>
          <th>Status</th>
          <th>Pembayaran</th>
          <th>Dibuat</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${filtered.map(ca => `
            <tr>
              <td data-label="Nomor SO" style="font-family:monospace;font-size:.82rem">${ca.project_po_number || '<span class="text-muted">–</span>'}</td>
              <td data-label="Judul" style="font-weight:600">${ca.title}</td>
              <td data-label="Karyawan" class="text-muted">${ca.request_by_name || '–'}</td>
              <td data-label="Total" class="text-right">${fmt.format(ca.initial_amount)}</td>
              <td data-label="Status">${STATUS_LABEL[ca.status] || ca.status}</td>
              <td data-label="Pembayaran">
                ${ca.status === 'open' && ca.payment_status === 'unpaid'
                  ? '<span class="badge" style="background:#fef3c7;color:#92400e">💰 Belum Dibayar</span>'
                  : ca.payment_status === 'paid'
                    ? '<span class="badge badge-masuk">✅ Dibayar</span>'
                    : '<span class="text-muted">–</span>'}
              </td>
              <td data-label="Dibuat" class="text-muted" style="font-size:.8rem">${fmtDate(ca.request_at)}</td>
              <td><a href="/duitkau/ca?id=${ca.id}" class="btn btn-ghost btn-sm">Detail</a></td>
            </tr>`).join('')}
        </tbody>
      </table></div>`;
    }

    document.getElementById('caSearchSo').addEventListener('input', function () {
      renderCaDashboard(_caData, this.value);
    });
    document.getElementById('caClearSearch').addEventListener('click', () => {
      document.getElementById('caSearchSo').value = '';
      renderCaDashboard(_caData, '');
    });

    // ─── Laporan ──────────────────────────────
    async function loadSummary(month) {
      const url = month ? `/api/finance/summary?month=${month}` : '/api/finance/summary';
      try {
        const data = await fetch(url).then(r => { if (!r.ok) throw new Error(); return r.json(); });
        renderSummary(data);
        renderEmployees(data, month);
      } catch {
        document.getElementById('mainAlert').textContent = 'Gagal memuat data laporan';
        document.getElementById('mainAlert').classList.add('show');
      }
    }

    function renderSummary(data) {
      const totMasuk = data.reduce((s, e) => s + e.totalMasuk, 0);
      const totKeluar = data.reduce((s, e) => s + e.totalKeluar, 0);
      const totSisa = data.reduce((s, e) => s + (e.net > 0 ? e.net : 0), 0);
      const totKlaim = data.reduce((s, e) => s + (e.net < 0 ? Math.abs(e.net) : 0), 0);
      document.getElementById('grandMasuk').textContent = fmt.format(totMasuk);
      document.getElementById('grandKeluar').textContent = fmt.format(totKeluar);
      document.getElementById('grandSisa').textContent = fmt.format(totSisa);
      document.getElementById('grandKlaim').textContent = fmt.format(totKlaim);
    }

    function renderEmployees(data, month) {
      const container = document.getElementById('employeeList');
      if (data.length === 0) {
        container.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">📭</div>Tidak ada transaksi${month ? ' pada periode ini' : ''}</div></div>`;
        return;
      }
      container.innerHTML = data.map(emp => `
        <div class="employee-block">
          <details open>
            <summary>
              <div class="emp-header-row">
                <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
                  <div class="employee-name">👤 ${emp.fullName} <span class="text-muted" style="font-weight:400;font-size:.8rem">@${emp.username}</span></div>
                  <a href="/duitkau/employee-detail?id=${emp.userId}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()" style="font-size:.75rem;padding:.25rem .65rem;white-space:nowrap">Detail →</a>
                </div>
                <div class="employee-stats">
                  <div class="emp-stat"><span class="emp-stat-label">Masuk</span><span class="emp-stat-val amount-masuk">${fmt.format(emp.totalMasuk)}</span></div>
                  <div class="emp-stat"><span class="emp-stat-label">Keluar</span><span class="emp-stat-val amount-keluar">${fmt.format(emp.totalKeluar)}</span></div>
                  <div class="emp-stat"><span class="emp-stat-label ${emp.net >= 0 ? 'amount-masuk' : 'amount-keluar'}" style="font-weight:600">${emp.net >= 0 ? 'Sisa' : 'Klaim'}</span><span class="emp-stat-val ${emp.net >= 0 ? 'amount-masuk' : 'amount-keluar'}">${fmt.format(Math.abs(emp.net))}</span></div>
                </div>
              </div>
            </summary>
            <div class="employee-body">
              ${emp.transactions.length === 0
                ? `<div class="empty" style="padding:1.5rem"><div class="empty-icon">📭</div>Tidak ada transaksi</div>`
                : `<div class="table-wrapper">
                    <table class="tx-responsive-table">
                      <thead>
                        <tr>
                          <th>Tanggal</th><th>Nama</th><th>Jenis</th>
                          <th class="text-right">Nominal</th><th>Kategori</th>
                          <th>Proyek</th><th>Bukti</th><th>Catatan</th>
                          <th class="text-center">Aksi</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${emp.transactions.map(tx => `
                          <tr class="${tx.type}">
                            <td data-label="Tanggal">${fmtDate(tx.date)}</td>
                            <td data-label="Nama">${tx.name}</td>
                            <td data-label="Jenis"><span class="badge badge-${tx.type}">${tx.type === 'masuk' ? 'Masuk' : 'Keluar'}</span></td>
                            <td data-label="Nominal" class="text-right amount-${tx.type}">${fmt.format(tx.amount)}</td>
                            <td data-label="Kategori" class="text-muted">${tx.category_name || '–'}</td>
                            <td data-label="Proyek" class="text-muted">${tx.project_name || '–'}</td>
                            <td data-label="Bukti">${tx.proof_image ? `<img class="proof-thumb" src="${tx.proof_image}" onclick="openLightbox('${tx.proof_image}')" />` : '–'}</td>
                            <td data-label="Catatan" class="text-muted">${tx.note || '–'}</td>
                            <td class="text-center no-label">
                              <button class="btn btn-ghost btn-sm text-red" style="padding:.2rem .5rem" onclick="deleteTx(${tx.id}, '${tx.name.replace(/'/g, "\\'")}')">🗑️</button>
                            </td>
                          </tr>`).join('')}
                      </tbody>
                      <tfoot>
                        <tr style="background:var(--gray-50)">
                          <td colspan="3" style="font-weight:600;font-size:.8rem;color:var(--gray-600)">SUBTOTAL</td>
                          <td class="text-right">
                            <div class="amount-masuk" style="font-size:.8rem">+${fmt.format(emp.totalMasuk)}</div>
                            <div class="amount-keluar" style="font-size:.8rem">−${fmt.format(emp.totalKeluar)}</div>
                          </td>
                          <td colspan="4">
                            <span class="${emp.net >= 0 ? 'amount-masuk' : 'amount-keluar'}" style="font-weight:700;font-size:.85rem">${emp.net >= 0 ? 'Sisa' : 'Klaim'}: ${fmt.format(Math.abs(emp.net))}</span>
                          </td>
                        </tr>
                      </tfoot>
                    </table>
                  </div>`
              }
            </div>
          </details>
        </div>
      `).join('');
    }

    // ─── Lightbox ─────────────────────────────
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
    });

    // ─── Filter ───────────────────────────────
    let _reimburseLoaded = false;
    document.getElementById('filterMonth').addEventListener('change', (e) => loadSummary(e.target.value || null));
    document.getElementById('clearFilter').addEventListener('click', () => {
      document.getElementById('filterMonth').value = ''; loadSummary(null);
    });

    // ─── Confirm Dialog ───────────────────────
    function showConfirm(title, htmlContent) {
      return new Promise((resolve) => {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmDetails').innerHTML = htmlContent;
        const overlay = document.getElementById('confirmOverlay');
        overlay.classList.add('open');

        const btnOk = document.getElementById('confirmOk');
        const btnCancel = document.getElementById('confirmCancel');
        
        const cleanup = () => {
          btnOk.removeEventListener('click', onOk);
          btnCancel.removeEventListener('click', onCancel);
          overlay.classList.remove('open');
        };

        const onOk = () => { cleanup(); resolve(true); };
        const onCancel = () => { cleanup(); resolve(false); };

        btnOk.addEventListener('click', onOk);
        btnCancel.addEventListener('click', onCancel);
      });
    }

    // ─── Hapus Transaksi ──────────────────────
    async function deleteTx(id, name) {
      document.getElementById('mainAlert').classList.remove('show');
      document.getElementById('mainSuccess').classList.remove('show');

      const ok = await showConfirm('Hapus Transaksi?', `Apakah Anda yakin ingin menghapus transaksi <strong>${name}</strong>? Data yang dihapus tidak dapat dikembalikan.`);
      if (!ok) return;

      try {
        const res = await fetch(`/api/finance/delete-transaction/${id}`, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json();
          document.getElementById('mainAlert').textContent = err.error || 'Gagal menghapus transaksi';
          document.getElementById('mainAlert').classList.add('show');
          return;
        }
        
        // Refresh laporan
        const month = document.getElementById('filterMonth').value || null;
        await loadSummary(month);

        // Show Success Alert
        document.getElementById('mainSuccess').textContent = `✅ Transaksi "${name}" berhasil dihapus.`;
        document.getElementById('mainSuccess').classList.add('show');
        setTimeout(() => document.getElementById('mainSuccess').classList.remove('show'), 4000);
      } catch (e) {
        document.getElementById('mainAlert').textContent = 'Gagal menghapus transaksi';
        document.getElementById('mainAlert').classList.add('show');
      }
    }
  </script>
</body>
</html>
