<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Kelola Karyawan</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/layout.js"></script>
  <script src="/js/utils.js"></script>
</head>
<body data-page="employees">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <!-- Main -->
    <main class="main-content">
      <div class="flex items-center justify-between" style="margin-bottom:1.25rem">
        <h1 class="page-title" style="margin-bottom:0">Kelola Pengguna</h1>
        <button class="btn btn-primary" id="btnAdd">+ Tambah Pengguna</button>
      </div>

      <div id="mainAlert" class="alert alert-error"></div>
      <div id="mainSuccess" class="alert alert-success"></div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Lengkap</th>
                <th>Username</th>
                <th>Role</th>
                <th>Bergabung</th>
                <th class="text-right">Aksi</th>
              </tr>
            </thead>
            <tbody id="empBody">
              <tr>
                <td colspan="6">
                  <div class="empty"><div class="empty-icon">🔄</div>Memuat data...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Tambah/Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Tambah Karyawan</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="modalAlert" class="alert alert-error"></div>
        <form id="empForm">
          <input type="hidden" id="empId" />
          <div class="form-group">
            <label for="fullName">Nama Lengkap</label>
            <input type="text" id="fullName" placeholder="Contoh: Budi Santoso" required />
          </div>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Contoh: budi" required />
          </div>
          <div class="form-group" id="roleGroup">
            <label for="empRole">Role</label>
            <select id="empRole">
              <option value="employee">Karyawan</option>
              <option value="finance">Finance</option>
            </select>
          </div>
          <div class="form-group">
            <label for="password" id="passwordLabel">Password</label>
            <input type="password" id="password" placeholder="Minimal 6 karakter" />
            <small class="text-muted" id="passwordHint" style="display:none;margin-top:.3rem">Kosongkan jika tidak ingin mengubah password</small>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnCancel">Batal</button>
        <button class="btn btn-primary" id="btnSave">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Hapus Karyawan</span>
        <button class="modal-close" id="deleteClose">✕</button>
      </div>
      <div class="modal-body">
        <p>Hapus pengguna <strong id="deleteName"></strong>?</p>
        <p class="text-muted mt-1" style="font-size:.85rem">Semua transaksi milik karyawan ini juga akan dihapus permanen.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnDeleteCancel">Batal</button>
        <button class="btn btn-danger" id="btnDeleteConfirm">Hapus</button>
      </div>
    </div>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <div id="modals-placeholder"></div>

  <script>
    const fmtDate = (d) => new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
    let deleteTargetId = null;

    window.onLayoutReady = async function(user) {
      await loadEmployees();
    };

    async function loadEmployees() {
      try {
        const res = await fetch('/api/employees');
        const data = await res.json();
        renderTable(data);
      } catch {
        showAlert('mainAlert', 'Gagal memuat data karyawan');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('empBody');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">👥</div>Belum ada karyawan</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.map((emp, i) => `
        <tr>
          <td class="text-muted">${i + 1}</td>
          <td><strong>${emp.full_name}</strong></td>
          <td class="text-muted">@${emp.username}</td>
          <td><span class="badge ${emp.role === 'finance' ? 'badge-masuk' : 'badge-keluar'}">${emp.role === 'finance' ? 'Finance' : 'Karyawan'}</span></td>
          <td class="text-muted">${fmtDate(emp.created_at)}</td>
          <td class="text-right">
            <button class="btn btn-ghost btn-sm" onclick="openEdit(${emp.id}, '${emp.full_name.replace(/'/g, "\\'")}', '${emp.username}')">Edit</button>
            ${emp.id !== window.currentUser.userId ? `<button class="btn btn-danger btn-sm" style="margin-left:.3rem" onclick="openDelete(${emp.id}, '${emp.full_name.replace(/'/g, "\\'")}')">Hapus</button>` : '<span class="text-muted" style="font-size:.75rem;margin-left:.5rem">Anda</span>'}
          </td>
        </tr>
      `).join('');
    }

    // ─── Modal Tambah/Edit ────────────────────
    function openAdd() {
      document.getElementById('modalTitle').textContent = 'Tambah Pengguna';
      document.getElementById('empId').value = '';
      document.getElementById('fullName').value = '';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('empRole').value = 'employee';
      document.getElementById('password').required = true;
      document.getElementById('passwordHint').style.display = 'none';
      document.getElementById('passwordLabel').textContent = 'Password';
      document.getElementById('roleGroup').style.display = '';
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('fullName').focus();
    }

    function openEdit(id, fullName, username) {
      document.getElementById('modalTitle').textContent = 'Edit Pengguna';
      document.getElementById('empId').value = id;
      document.getElementById('fullName').value = fullName;
      document.getElementById('username').value = username;
      document.getElementById('password').value = '';
      document.getElementById('password').required = false;
      document.getElementById('passwordHint').style.display = 'block';
      document.getElementById('passwordLabel').textContent = 'Ubah Password';
      document.getElementById('roleGroup').style.display = 'none';
      hideAlert('modalAlert');
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('fullName').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    document.getElementById('btnAdd').addEventListener('click', openAdd);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    document.getElementById('btnSave').addEventListener('click', async () => {
      hideAlert('modalAlert');
      const id = document.getElementById('empId').value;
      const body = {
        full_name: document.getElementById('fullName').value.trim(),
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('empRole').value,
      };

      if (!body.full_name || !body.username) {
        showAlert('modalAlert', 'Nama lengkap dan username wajib diisi');
        return;
      }
      if (!id && !body.password) {
        showAlert('modalAlert', 'Password wajib diisi untuk pengguna baru');
        return;
      }

      const btn = document.getElementById('btnSave');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      try {
        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/employees/${id}` : '/api/employees';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) { showAlert('modalAlert', data.error); return; }

        closeModal();
        showAlert('mainSuccess', id ? 'Pengguna berhasil diperbarui!' : 'Pengguna berhasil ditambahkan!');
        await loadEmployees();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        showAlert('modalAlert', 'Terjadi kesalahan, coba lagi');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Simpan';
      }
    });

    // ─── Modal Hapus ──────────────────────────
    function openDelete(id, name) {
      deleteTargetId = id;
      document.getElementById('deleteName').textContent = name;
      document.getElementById('deleteOverlay').classList.add('open');
    }

    function closeDelete() {
      document.getElementById('deleteOverlay').classList.remove('open');
      deleteTargetId = null;
    }

    document.getElementById('deleteClose').addEventListener('click', closeDelete);
    document.getElementById('btnDeleteCancel').addEventListener('click', closeDelete);
    document.getElementById('deleteOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteOverlay')) closeDelete();
    });

    document.getElementById('btnDeleteConfirm').addEventListener('click', async () => {
      if (!deleteTargetId) return;
      const btn = document.getElementById('btnDeleteConfirm');
      btn.disabled = true;
      btn.textContent = 'Menghapus...';
      try {
        const res = await fetch(`/api/employees/${deleteTargetId}`, { method: 'DELETE' });
        if (!res.ok && res.status !== 204) {
          const d = await res.json();
          alert(d.error || 'Gagal menghapus');
          return;
        }
        closeDelete();
        showAlert('mainSuccess', 'Karyawan berhasil dihapus');
        await loadEmployees();
        setTimeout(() => hideAlert('mainSuccess'), 3000);
      } catch {
        alert('Terjadi kesalahan');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Hapus';
      }
    });

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideAlert(id) {
      document.getElementById(id).classList.remove('show');
    }
  </script>
</body>
</html>
