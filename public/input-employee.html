<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuitKau - Input Transaksi</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <script src="/js/layout.js"></script>
  <script src="/js/utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/id.js"></script>
</head>
<body data-page="input-employee">
  <div id="navbar-placeholder"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <h1 class="page-title">Input Transaksi</h1>
      <p class="text-muted" style="margin-bottom:1.25rem;font-size:.875rem">Transaksi yang diinput oleh finance langsung berstatus <strong>Disetujui</strong>.</p>

      <div class="grid-2">
        <!-- FORM -->
        <div class="card no-print">
          <div class="card-title">✏️ Form Input</div>
          <div id="formAlert" class="alert alert-error"></div>
          <div id="formSuccess" class="alert alert-success"></div>

          <form id="txForm">
            <div class="form-group">
              <label for="userId">Karyawan</label>
              <select id="userId" required>
                <option value="">-- Pilih karyawan --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="type">Jenis Transaksi</label>
              <select id="type" required>
                <option value="">-- Pilih jenis --</option>
                <option value="masuk">💚 Masuk (Pemasukan)</option>
                <option value="keluar">❤️ Keluar (Pengeluaran)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="name">Nama Transaksi</label>
              <input type="text" id="name" placeholder="Contoh: Gaji Maret, Reimburse BBM..." required />
            </div>
            <div class="form-group">
              <label for="amount">Nominal (Rp)</label>
              <input type="text" id="amount" inputmode="numeric" placeholder="Contoh: 5.000.000" autocomplete="off" required />
            </div>
            <div class="form-group">
              <label for="date">Tanggal Transaksi</label>
              <input type="text" id="date" inputmode="numeric" maxlength="10" placeholder="DD/MM/YYYY" autocomplete="off" required />
            </div>
            <div class="form-group">
              <label for="note">Catatan (opsional)</label>
              <textarea id="note" placeholder="Keterangan tambahan..."></textarea>
            </div>
            <div class="form-group">
              <label for="categoryId">Kategori <span style="color:var(--red)">*</span></label>
              <select id="categoryId" required>
                <option value="">-- Pilih kategori --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="caId">Cash Advance (opsional)</label>
              <select id="caId">
                <option value="">-- Tidak terkait CA --</option>
              </select>
            </div>
            <div class="form-group">
              <label for="projectId">Proyek (opsional)</label>  
              <select id="projectId">
                <option value="">-- Tidak ada proyek --</option>
              </select>
            </div>

            <!-- Bukti Foto -->
            <div class="form-group">
              <label>Bukti Transaksi (Foto)</label>
              <div class="file-input-wrap">
                <input type="file" id="proofImage" accept="image/*" capture="environment" />
              </div>
              <div class="file-input-hint">📷 Bisa pilih dari galeri atau ambil foto langsung</div>
              <div class="proof-preview-wrap" id="previewWrap">
                <div class="proof-preview-label">Preview:</div>
                <img id="previewImg" src="" alt="Preview" />
                <div class="proof-remove" id="removePreview">✕ Hapus foto</div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
              Simpan Transaksi
            </button>
          </form>
        </div>

        <!-- Riwayat input oleh finance hari ini -->
        <div class="card">
          <div class="card-title">📋 Input Hari Ini</div>
          <div id="tableAlert" class="alert alert-error"></div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Karyawan</th>
                  <th>Nama</th>
                  <th>Jenis</th>
                  <th class="text-right">Nominal</th>
                  <th>Bukti</th>
                </tr>
              </thead>
              <tbody id="todayBody">
                <tr><td colspan="5"><div class="empty"><div class="empty-icon">🔄</div>Memuat...</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="bottom-nav-placeholder"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-close" id="lightboxClose">✕</div>
    <img id="lightboxImg" src="" alt="Bukti transaksi" />
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="confirmTitle">Konfirmasi</span>
      </div>
      <div class="modal-body">
        <div id="confirmDetails" style="font-size:.9rem; line-height:1.7; color:var(--gray-600)"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Batal</button>
        <button class="btn btn-primary" id="confirmOk">Ya, Lanjutkan</button>
      </div>
    </div>
  </div>

  <div id="modals-placeholder"></div>

  <script>
    const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
    const fmtDate = (d) => new Date(d + 'T00:00:00').toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

    // ─── Date helpers ─────────────────────────
    function parseDateDMY(val) {
      const p = val.split('/');
      if (p.length !== 3 || p[0].length !== 2 || p[1].length !== 2 || p[2].length !== 4) return null;
      const iso = `${p[2]}-${p[1]}-${p[0]}`;
      const d = new Date(iso + 'T00:00:00');
      if (isNaN(d.getTime())) return null;
      return iso;
    }
    const fpDate = flatpickr('#date', { dateFormat: 'd/m/Y', allowInput: true, locale: 'id' });

    // ─── Nominal auto-format ──────────────────
    function formatThousands(raw) {
      const digits = raw.replace(/\D/g, '');
      if (!digits) return '';
      return parseInt(digits, 10).toLocaleString('id-ID');
    }
    function parseAmount(formatted) {
      return parseFloat(formatted.replace(/\./g, '').replace(',', '.')) || 0;
    }
    document.getElementById('amount').addEventListener('input', function () {
      const pos = this.selectionStart;
      const before = this.value.length;
      this.value = formatThousands(this.value);
      const diff = this.value.length - before;
      this.setSelectionRange(pos + diff, pos + diff);
    });

    let allCAs = [];

    window.onLayoutReady = async function(user) {
      fpDate.setDate(new Date(), true);
      await Promise.all([loadEmployees(), loadCategories(), loadProjects(), loadToday(), loadCAs()]);
    };

    async function loadEmployees() {
      const users = await fetch('/api/finance/employees').then(r => r.json());
      const sel = document.getElementById('userId');
      const employees = users.filter(u => u.role === 'employee');
      const financeUsers = users.filter(u => u.role === 'finance');

      if (employees.length > 0) {
        const grp = document.createElement('optgroup');
        grp.label = 'Karyawan';
        employees.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.full_name + ' (@' + u.username + ')';
          grp.appendChild(opt);
        });
        sel.appendChild(grp);
      }
      if (financeUsers.length > 0) {
        const grp = document.createElement('optgroup');
        grp.label = 'Tim Finance';
        financeUsers.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.full_name + ' (@' + u.username + ')';
          grp.appendChild(opt);
        });
        sel.appendChild(grp);
      }
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/categories').then(r => r.json());
        const sel = document.getElementById('categoryId');
        res.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadProjects() {
      try {
        const res = await fetch('/api/projects').then(r => r.json());
        const sel = document.getElementById('projectId');
        res.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadCAs() {
      try {
        const res = await fetch('/api/ca').then(r => r.json());
        allCAs = res.filter(ca => ca.status === 'open');
        filterCAs();
      } catch {}
    }

    function filterCAs() {
      const selectedUser = document.getElementById('userId').value;
      const sel = document.getElementById('caId');
      
      if (!selectedUser) {
        sel.innerHTML = '<option value="">-- Pilih Karyawan Dulu --</option>';
        return;
      }
      
      sel.innerHTML = '<option value="">-- Tidak terkait CA --</option>';
      let found = false;
      
      allCAs.forEach(ca => {
        if (ca.request_by == selectedUser) {
          const opt = document.createElement('option');
          opt.value = ca.id;
          opt.textContent = ca.title;
          sel.appendChild(opt);
          found = true;
        }
      });
      
      if (!found) {
        sel.innerHTML = '<option value="">-- Tidak ada CA Open --</option>';
      }
      
      // Reset disabled state of project
      const projInput = document.getElementById('projectId');
      projInput.disabled = false;
      projInput.value = "";
    }

    document.getElementById('userId').addEventListener('change', filterCAs);

    document.getElementById('caId').addEventListener('change', function() {
      const selectedCaId = this.value;
      const projInput = document.getElementById('projectId');
      
      if (!selectedCaId) {
        projInput.disabled = false;
        projInput.value = "";
        return;
      }
      
      const ca = allCAs.find(c => c.id == selectedCaId);
      // CA terpilih. Selalu disable manual project input.
      projInput.disabled = true;
      if (ca && ca.project_id) {
        projInput.value = ca.project_id;
      } else {
        projInput.value = "";
      }
    });

    async function loadToday() {
      const today = new Date().toISOString().slice(0, 10);
      try {
        // Ambil laporan hari ini dari semua karyawan
        const data = await fetch(`/api/finance/report?userId=all&periodType=date&periodValue=${today}`).then(r => r.json());
        const allTx = data.flatMap(emp => emp.transactions.map(tx => ({ ...tx, fullName: emp.fullName, username: emp.username })));
        const tbody = document.getElementById('todayBody');
        if (allTx.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="empty-icon">📭</div>Belum ada input hari ini</div></td></tr>`;
          return;
        }
        tbody.innerHTML = allTx.map(tx => `
          <tr class="${tx.type}">
            <td>${tx.fullName}</td>
            <td>${tx.name}</td>
            <td><span class="badge badge-${tx.type}">${tx.type === 'masuk' ? 'Masuk' : 'Keluar'}</span></td>
            <td class="text-right amount-${tx.type}">${fmt.format(tx.amount)}</td>
            <td>${tx.proof_image ? `<img class="proof-thumb" src="${tx.proof_image}" onclick="openLightbox('${tx.proof_image}')" />` : '–'}</td>
          </tr>
        `).join('');
      } catch { showAlert('tableAlert', 'Gagal memuat riwayat'); }
    }

    // ─── Preview foto ─────────────────────────
    document.getElementById('proofImage').addEventListener('change', function () {
      const file = this.files[0];
      const wrap = document.getElementById('previewWrap');
      if (!file) { wrap.classList.remove('show'); return; }
      const reader = new FileReader();
      reader.onload = (e) => { document.getElementById('previewImg').src = e.target.result; wrap.classList.add('show'); };
      reader.readAsDataURL(file);
    });
    document.getElementById('removePreview').addEventListener('click', () => {
      document.getElementById('proofImage').value = '';
      document.getElementById('previewWrap').classList.remove('show');
    });

    // ─── Submit ───────────────────────────────
    document.getElementById('txForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!window.getDbOk()) return showAlert('formAlert', 'Database tidak terhubung');
      hideAlert('formAlert'); hideAlert('formSuccess');

      // Confirm before submit
      const empName = document.getElementById('userId').options[document.getElementById('userId').selectedIndex].text.split(' (')[0];
      const typeTxt = document.getElementById('type').value === 'masuk' ? 'Pemasukan' : 'Pengeluaran';
      const amtTxt = fmt.format(parseAmount(document.getElementById('amount').value));
      const catSel = document.getElementById('categoryId');
      const catTxt = catSel.value ? catSel.options[catSel.selectedIndex].text : '–';
      const projSel = document.getElementById('projectId');
      const projTxt = projSel.value ? projSel.options[projSel.selectedIndex].text : '–';
      const details = `Karyawan: <strong>${empName}</strong><br>Jenis: <strong>${typeTxt}</strong><br>Nama: <strong>${document.getElementById('name').value}</strong><br>Nominal: <strong>${amtTxt}</strong><br>Kategori: <strong>${catTxt}</strong><br>Proyek: <strong>${projTxt}</strong>`;
      const ok = await showConfirm('Simpan Transaksi?', details);
      if (!ok) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Menyimpan...';

      const parsedDate = parseDateDMY(document.getElementById('date').value);
      if (!parsedDate) { showAlert('formAlert', 'Format tanggal tidak valid (DD/MM/YYYY)'); btn.disabled = false; btn.textContent = 'Simpan Transaksi'; return; }

      const fd = new FormData();
      fd.append('userId', document.getElementById('userId').value);
      fd.append('type', document.getElementById('type').value);
      fd.append('name', document.getElementById('name').value);
      fd.append('amount', parseAmount(document.getElementById('amount').value));
      fd.append('date', parsedDate);
      fd.append('note', document.getElementById('note').value);
      fd.append('category_id', document.getElementById('categoryId').value || '');
      
      // Jika select di-disable, nilainya tidak otomatis masuk ke FormData.
      // Jadi kita sertakan secara manual membacanya dari element.
      const projVal = document.getElementById('projectId').value;
      fd.append('project_id', projVal || '');
      
      fd.append('ca_id', document.getElementById('caId').value || '');
      const file = document.getElementById('proofImage').files[0];
      if (file) fd.append('proof_image', file);

      try {
        const res = await fetch('/api/finance/input-employee', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) { showAlert('formAlert', data.error); return; }

        const empNameFull = document.getElementById('userId').options[document.getElementById('userId').selectedIndex].text;
        showAlert('formSuccess', `✅ Transaksi untuk ${empNameFull.split(' (')[0]} berhasil disimpan!`);
        document.getElementById('txForm').reset();
        fpDate.setDate(new Date(), true);
        document.getElementById('previewWrap').classList.remove('show');
        document.getElementById('projectId').disabled = false;
        await loadToday();
        setTimeout(() => hideAlert('formSuccess'), 4000);
      } catch { showAlert('formAlert', 'Gagal menyimpan transaksi'); }
      finally { btn.disabled = false; btn.textContent = 'Simpan Transaksi'; }
    });

    // ─── Lightbox ─────────────────────────────
    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open');
    });

    function showAlert(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('show'); }
    function hideAlert(id) { document.getElementById(id).classList.remove('show'); }
  </script>
</body>
</html>
